version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: business-directory-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=${PGDB}
      - POSTGRES_MULTIPLE_DATABASES=${PGDB}test
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: business-directory-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - RUST_LOG=debug
      - USE_LOCAL_DB=false
      - DATABASE_URL=postgresql://${PGUSER}:${PGPASSWORD}@postgres:5432/${PGDB}
      - HOST=0.0.0.0
      - PORT=8000
      - FRONTEND_URL=${FRONTEND_URL}
      - ADMIN_URL=${ADMIN_URL}
      - ENVIRONMENT=${ENVIRONMENT}
      - ADDITIONAL_ALLOWED_ORIGINS=${ADDITIONAL_ALLOWED_ORIGINS}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  # Frontend service commented out for now
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: business-directory-frontend
  #   depends_on:
  #     - backend
  #   environment:
  #     - API_URL=http://localhost:8001/api
  #     - VITE_DIRECTORY_ID=default
  #   ports:
  #     - "5001:5000"
  #   restart: unless-stopped
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: business-directory-admin
    env_file:
      - ./admin/.env
    depends_on:
      - backend
    environment:
      - VITE_BROWSER_API_URL=http://localhost:8000
      - VITE_CONTAINER_API_URL=http://backend:8000
    ports:
      - "5150:5150"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5150"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: 