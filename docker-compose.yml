version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: business-directory-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=${PGDB}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: business-directory-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - RUST_LOG=debug
    ports:
      - "8001:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend service commented out for now
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: business-directory-frontend
  #   depends_on:
  #     - backend
  #   environment:
  #     - API_URL=http://localhost:8001/api
  #     - VITE_DIRECTORY_ID=default
  #   ports:
  #     - "5001:5000"
  #   restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: business-directory-admin
    env_file:
      - .env
    depends_on:
      - backend
    environment:
      - API_URL=http://localhost:8001/api
      - BASE_URL=http://localhost:8001
    ports:
      - "5151:5150"
    restart: unless-stopped

volumes:
  postgres_data: 