
services:
  postgres:
    image: postgres:15
    container_name: atlas-platform-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=${PGDB}
      - POSTGRES_MULTIPLE_DATABASES=${PGDB}test
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      target: ${DOCKER_TARGET:-development}
    container_name: atlas-platform-backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_cargo_cache:/usr/local/cargo/registry
      - backend_target_cache:/app/target
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend/src
          target: /app/src
          action: rebuild
        - path: ./backend/Cargo.toml
          target: /app/Cargo.toml
          action: rebuild
    environment:
      RUST_LOG: debug
      # RUSTFLAGS: -D warnings
      USE_LOCAL_DB: false
      DATABASE_URL: postgresql://${PGUSER}:${PGPASSWORD}@postgres:5432/${PGDB}
      HOST: 0.0.0.0
      PORT: 8000
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_URL: ${ADMIN_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      ADDITIONAL_ALLOWED_ORIGINS: ${ADDITIONAL_ALLOWED_ORIGINS}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  network-instance:
    build:
      context: ./apps/network-instance
      target: ${DOCKER_TARGET:-development}
    container_name: atlas-platform-instance
    env_file:
      - .env
    volumes:
      - ./apps/network-instance:/app
      - ./apps/shared-ui:/shared-ui
      - backend_cargo_cache:/usr/local/cargo/registry
      - backend_target_cache:/app/target
    ports:
      - "8080:8080"
    depends_on:
      - backend
    develop:
      watch:
        - path: ./apps/network-instance/src
          target: /app/src
          action: rebuild
        - path: ./apps/network-instance/Cargo.toml
          target: /app/Cargo.toml
          action: rebuild
    environment:
      - API_URL=http://backend:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  platform-admin:
    build:
      context: ./apps/platform-admin
      target: ${DOCKER_TARGET:-development}
    container_name: atlas-platform-admin
    env_file:
      - .env
    volumes:
      - ./apps/platform-admin:/app
      - ./apps/shared-ui:/shared-ui
      - backend_cargo_cache:/usr/local/cargo/registry
      - backend_target_cache:/app/target
    ports:
      - "8081:8081"
    depends_on:
      - backend
    develop:
      watch:
        - path: ./apps/platform-admin/src
          target: /app/src
          action: rebuild
        - path: ./apps/platform-admin/Cargo.toml
          target: /app/Cargo.toml
          action: rebuild
        - path: ./apps/platform-admin/index.html
          target: /app/index.html
          action: rebuild
    environment:
      - API_URL=http://backend:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  proxy:
    image: caddy:2-alpine
    container_name: atlas-platform-proxy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - network-instance
      - platform-admin
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  backend_cargo_cache:
  backend_target_cache: 