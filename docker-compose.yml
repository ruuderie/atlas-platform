
services:
  postgres:
    image: postgres:15
    container_name: business-directory-db
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=${PGDB}
      - POSTGRES_MULTIPLE_DATABASES=${PGDB}test
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      target: ${DOCKER_TARGET:-development}
    container_name: business-directory-backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_cargo_cache:/usr/local/cargo/registry
      - backend_target_cache:/app/target
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend/src
          target: /app/src
          action: rebuild
        - path: ./backend/Cargo.toml
          target: /app/Cargo.toml
          action: rebuild
    environment:
      - RUST_LOG=debug
      - USE_LOCAL_DB=false
      - DATABASE_URL=postgresql://${PGUSER}:${PGPASSWORD}@postgres:5432/${PGDB}
      - HOST=0.0.0.0
      - PORT=8000
      - FRONTEND_URL=${FRONTEND_URL}
      - ADMIN_URL=${ADMIN_URL}
      - ENVIRONMENT=${ENVIRONMENT}
      - ADDITIONAL_ALLOWED_ORIGINS=${ADDITIONAL_ALLOWED_ORIGINS}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  # Frontend service commented out for now
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: business-directory-frontend
  #   depends_on:
  #     - backend
  #   environment:
  #     - API_URL=http://localhost:8001/api
  #     - VITE_DIRECTORY_ID=default
  #   ports:
  #     - "5001:5000"
  #   restart: unless-stopped
  admin:
    build:
      context: ./admin
      target: ${DOCKER_TARGET:-development}
    container_name: business-directory-admin
    env_file:
      - ./admin/.env
    volumes:
      - ./admin:/app
      - /app/node_modules
    ports:
      - "5150:5150"
    depends_on:
      - backend
    develop:
      watch:
        - path: ./admin/src
          target: /app/src
          action: rebuild
        - path: ./admin/package.json
          target: /app/package.json
          action: rebuild
        - path: ./admin/pnpm-lock.yaml
          target: /app/pnpm-lock.yaml
          action: rebuild
    environment:
      - VITE_BROWSER_API_URL=${BROWSER_API_URL}
      - VITE_CONTAINER_API_URL=${CONTAINER_API_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5150"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  backend_cargo_cache:
  backend_target_cache: 