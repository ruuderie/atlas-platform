services:
  postgres:
    image: postgres:15
    container_name: atlas-platform-db
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_DB=${PGDB}
      - POSTGRES_MULTIPLE_DATABASES=${PGDB}test
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      # Default = server parity: baked binary (same shape as K8s), not `cargo run`.
      # Opt into compile-in-container with: atlas-local up --hot  (docker-compose.hot.yml)
      target: ${BACKEND_TARGET:-production}
      args:
        # debug is much faster to build locally; release matches CI (BACKEND_BUILD_PROFILE=release)
        BUILD_PROFILE: ${BACKEND_BUILD_PROFILE:-debug}
    container_name: atlas-platform-backend
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      USE_LOCAL_DB: "false"
      DATABASE_URL: postgresql://${PGUSER}:${PGPASSWORD}@postgres:5432/${PGDB}
      HOST: 0.0.0.0
      PORT: "8000"
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_URL: ${ADMIN_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      ADDITIONAL_ALLOWED_ORIGINS: ${ADDITIONAL_ALLOWED_ORIGINS}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://admin.localhost}
      RP_ID: ${RP_ID:-localhost}
      METRICS_TOKEN: ${METRICS_TOKEN:-local-dev-metrics}
      # From .env.local via compose --env-file (atlas-local env set …). Required for sessions.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env.local for local login}
      # From .env.local via compose --env-file (atlas-local env set …). Empty/localhost = mock email.
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_TOKEN: ${SMTP_TOKEN:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Cloudflare R2 for Folio vault / PhotoMediaCard. Empty → presign 501.
      # Manage: atlas-local env r2 | atlas-local env set R2_ENDPOINT=…
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - app-network

  network-instance:
    build:
      context: ./apps/network-instance
      target: ${DOCKER_TARGET:-development}
    container_name: atlas-platform-instance
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    volumes:
      - ./apps/network-instance:/app
      - ./apps/shared-ui:/shared-ui
      - backend_cargo_cache:/usr/local/cargo/registry
      - backend_target_cache:/app/target
    ports:
      - "8080:8080"
    depends_on:
      - backend
    develop:
      watch:
        - path: ./apps/network-instance/src
          target: /app/src
          action: rebuild
        - path: ./apps/network-instance/Cargo.toml
          target: /app/Cargo.toml
          action: rebuild
    environment:
      - API_URL=http://backend:8000
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://api.localhost}
      - BROWSER_API_URL=${BROWSER_API_URL:-http://api.localhost}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  platform-admin:
    build:
      context: ./apps/platform-admin
      target: ${DOCKER_TARGET:-development}
    container_name: atlas-platform-admin
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    volumes:
      - ./apps/platform-admin:/app
      - ./apps/shared-ui:/shared-ui
      - backend_cargo_cache:/usr/local/cargo/registry
      - backend_target_cache:/app/target
    ports:
      - "8081:8081"
    depends_on:
      - backend
    develop:
      watch:
        - path: ./apps/platform-admin/src
          target: /app/src
          action: rebuild
        - path: ./apps/platform-admin/Cargo.toml
          target: /app/Cargo.toml
          action: rebuild
        - path: ./apps/platform-admin/index.html
          target: /app/index.html
          action: rebuild
    environment:
      - API_URL=http://backend:8000
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://api.localhost}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  folio:
    build:
      context: .
      dockerfile: apps/folio/Dockerfile
      target: runner
      args:
        # debug is much faster locally; CI/Woodpecker passes BUILD_PROFILE=release
        BUILD_PROFILE: ${FOLIO_BUILD_PROFILE:-debug}
    container_name: atlas-platform-folio
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    ports:
      - "3100:3100"
    # Local Compose only — K8s uses its own probes / Service DNS; do not mirror this
    # into server manifests. Wait for backend readiness so /verify does not race a
    # still-warming API after `atlas-local refresh`.
    depends_on:
      backend:
        condition: service_healthy
    develop:
      watch:
        - path: ./apps/folio/src
          target: /app/src
          action: rebuild
        - path: ./apps/folio/Cargo.toml
          target: /app/Cargo.toml
          action: rebuild
    environment:
      - ATLAS_API_URL=http://backend:8000
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://api.localhost}
      - LEPTOS_SITE_ADDR=0.0.0.0:3100
      - LEPTOS_SITE_ROOT=site
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      # Match K8s path (/api/health). Requires curl in the Folio runner image.
      test: ["CMD", "curl", "-f", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  anchor:
    build:
      context: .
      dockerfile: apps/anchor/Dockerfile
      target: runner
      args:
        # debug is much faster locally; CI/Woodpecker passes BUILD_PROFILE=release
        BUILD_PROFILE: ${ANCHOR_BUILD_PROFILE:-debug}
    container_name: atlas-platform-anchor
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    develop:
      watch:
        - path: ./apps/anchor/src
          action: rebuild
        - path: ./apps/anchor/Cargo.toml
          action: rebuild
        - path: ./apps/shared-ui/src
          action: rebuild
    environment:
      - ATLAS_API_URL=http://backend:8000
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://api.localhost}
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
      - LEPTOS_SITE_ROOT=site
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      # Anchor runner ships wget (not curl). Compose-only; K8s uses httpGet probes.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  proxy:
    image: caddy:2-alpine
    container_name: atlas-platform-proxy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - network-instance
      - platform-admin
      - folio
      - anchor
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  backend_cargo_cache:
  backend_target_cache:
