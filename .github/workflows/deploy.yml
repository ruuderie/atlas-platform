name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_PLATFORM_ADMIN: ${{ github.repository }}-platform-admin
  IMAGE_NAME_DIRECTORY_INSTANCE: ${{ github.repository }}-network-instance

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          target: production

      - name: Build and push Platform Admin Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/platform-admin
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PLATFORM_ADMIN }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PLATFORM_ADMIN }}:latest
          target: production

      - name: Build and push Network Instance Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/network-instance
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_DIRECTORY_INSTANCE }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_DIRECTORY_INSTANCE }}:latest
          target: production

  deploy:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Setup Kustomize
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        
      # Update the image tags in kustomization.yaml to the newly built SHA
      - name: Update Kubernetes manifests
        run: |
          cd k8s
          kustomize edit set image ghcr.io/yourusername/business-network-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
          kustomize edit set image ghcr.io/yourusername/business-network-platform-admin=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PLATFORM_ADMIN }}:${{ github.sha }}
          kustomize edit set image ghcr.io/yourusername/business-network-network-instance=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_DIRECTORY_INSTANCE }}:${{ github.sha }}
          
      # In a real environment, you would configure kubectl access here using secrets
      # - name: Deploy to Kubernetes
      #   run: |
      #     # kubectl config ...
      #     kustomize build k8s | kubectl apply -f -
