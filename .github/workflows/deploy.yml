name: Build and Deploy

on:
  push:
    branches: [ "main", "uat" ]
  pull_request:
    branches: [ "main", "uat" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_PLATFORM_ADMIN: ${{ github.repository }}-platform-admin
  IMAGE_NAME_DIRECTORY_INSTANCE: ${{ github.repository }}-network-instance
  IMAGE_NAME_ANCHOR: ruuderie/anchor-app

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Anchor App Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/anchor/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ANCHOR }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ANCHOR }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha,scope=anchor
          cache-to: type=gha,mode=max,scope=anchor

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
          target: production
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push Platform Admin Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/platform-admin
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PLATFORM_ADMIN }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PLATFORM_ADMIN }}:latest
          target: production
          cache-from: type=gha,scope=platform-admin
          cache-to: type=gha,mode=max,scope=platform-admin

      - name: Build and push Network Instance Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/network-instance
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_DIRECTORY_INSTANCE }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_DIRECTORY_INSTANCE }}:latest
          target: production
          cache-from: type=gha,scope=network-instance
          cache-to: type=gha,mode=max,scope=network-instance

  deploy:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Rolling restart anchor-app
        run: |
          kubectl rollout restart deployment/anchor-app -n atlas-platform
          kubectl rollout status deployment/anchor-app -n atlas-platform --timeout=300s

      - name: Rolling restart backend
        run: |
          kubectl rollout restart deployment/backend -n atlas-platform
          kubectl rollout status deployment/backend -n atlas-platform --timeout=300s

      - name: Verify deployments
        run: |
          kubectl get pods -n atlas-platform
          echo "--- anchor-app image ---"
          kubectl get deployment anchor-app -n atlas-platform -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""
          echo "--- backend image ---"
          kubectl get deployment backend -n atlas-platform -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo ""
