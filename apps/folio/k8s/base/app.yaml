apiVersion: apps/v1
kind: Deployment
metadata:
  name: folio-app
  namespace: folio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: folio-app
  template:
    metadata:
      labels:
        app: folio-app
    spec:
      containers:
      - name: folio-app
        image: folio-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3100
        env:
        - name: LEPTOS_SITE_ADDR
          value: "0.0.0.0:3100"
        - name: LEPTOS_SITE_ROOT
          value: "site"
        envFrom:
        - configMapRef:
            name: folio-config
        - secretRef:
            name: folio-secrets
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3100
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3100
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: folio-app
  namespace: folio
spec:
  selector:
    app: folio-app
  ports:
  - port: 80
    targetPort: 3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: folio-config
  namespace: folio
data:
  # Internal cluster URL — server fns call backend API directly
  ATLAS_API_URL: "http://atlas-backend.atlas-platform.svc.cluster.local:8000"
  # Public HTTPS URL injected into window.__ENV__ for browser fetch calls
  PUBLIC_API_BASE_URL: "https://api.oply.co"
  ENVIRONMENT: "production"
  RUST_LOG: "info"
