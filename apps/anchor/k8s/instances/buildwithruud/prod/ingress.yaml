apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: anchor-app-ingress
  namespace: buildwithruud-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-http"
    # T5: Bound proxy timeout to 10s. Well above the new <500ms response time
    # (SMTP is fire-and-forget). Guards against future regressions re-introducing
    # synchronous blocking before the HTTP response.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "10"
spec:
  tls:
  - hosts:
    - buildwithruud.com
    secretName: buildwithruud-tls
  rules:
  - host: buildwithruud.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: anchor-app
            port:
              number: 80
