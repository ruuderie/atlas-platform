apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: anchor-app-ingress
  namespace: buildwithruud-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-http"
spec:
  tls:
  - hosts:
    - buildwithruud.com
    secretName: buildwithruud-tls
  rules:
  - host: buildwithruud.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: anchor-app
            port:
              number: 80
