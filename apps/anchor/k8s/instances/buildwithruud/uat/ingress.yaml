apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: anchor-app-ingress
  namespace: buildwithruud-uat
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-http"
    # T5: Bound proxy timeout to 10s for parity with prod ingress.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "10"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - uat.buildwithruud.com
    secretName: buildwithruud-uat-tls
  rules:
  - host: uat.buildwithruud.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: anchor-app
            port:
              number: 80
