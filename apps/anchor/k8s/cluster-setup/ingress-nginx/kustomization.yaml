apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deploy.yaml

patches:
  - target:
      kind: Service
      name: ingress-nginx-controller
      namespace: ingress-nginx
    patch: |-
      - op: replace
        path: /spec/ports/0/nodePort
        value: 32080
      - op: replace
        path: /spec/ports/1/nodePort
        value: 32443
