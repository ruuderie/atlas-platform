apiVersion: apps/v1
kind: Deployment
metadata:
  name: anchor-app
  namespace: anchor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anchor-app
  template:
    metadata:
      labels:
        app: anchor-app
    spec:
      containers:
      - name: anchor-app
        image: anchor-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: anchor-app
  namespace: anchor
spec:
  selector:
    app: anchor-app
  ports:
  - port: 80
    targetPort: 3000
