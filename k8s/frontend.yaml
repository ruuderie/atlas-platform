apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: uat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/yourusername/business-directory-frontend:latest
        ports:
        - containerPort: 5000 # Matches your Dockerfile
        env:
        - name: ORIGIN
          value: "https://uat.yourdomain.com"
        - name: PORT
          value: "5000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: uat
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 5000