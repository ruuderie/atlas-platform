apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces.yaml
  - config.yaml
  - backend.yaml
  - platform-admin.yaml
  - directory-instance.yaml

images:
  - name: ghcr.io/yourusername/business-directory-backend
