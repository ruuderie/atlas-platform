    newTag: latest
  - name: ghcr.io/yourusername/business-directory-platform-admin
    newName: ghcr.io/yourusername/business-directory-platform-admin
    newTag: latest
  - name: ghcr.io/yourusername/business-directory-directory-instance
    newName: ghcr.io/yourusername/business-directory-directory-instance
    newTag: latest
