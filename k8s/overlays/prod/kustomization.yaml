apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atlas-platform

resources:
  - ../../base
  - ingress.yaml
  - config.yaml
  - sealed-secret.yaml
  # wildcard-tls-prod: covers *.atlas.oply.co for all ingress-sidecar provisioned apps.
  # cert-manager issues via DNS-01 (letsencrypt-prod). Once issued, every
  # *.atlas.oply.co Ingress the sidecar creates gets TLS automatically.
  - wildcard-cert.yaml

patches:
  - path: platform-admin-patch.yaml
  - path: backend-patch.yaml
