# Production sealed secrets — managed by Bitnami Sealed Secrets controller.
# 
# To generate this file:
#   1. Create a regular K8s Secret manifest with your prod values
#   2. Encrypt it: kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#   3. Commit this file (safe to store in git — only the cluster can decrypt it)
#
# The UAT environment uses CI-injected plaintext secrets for speed.
# Production MUST use sealed secrets — never plaintext in CI for prod.
#
# Until this is populated, the Woodpecker prod deployment will fail loudly
# at the kubectl apply step, which is intentional — prod should not deploy
# without explicit, reviewed secret management.
#
# PLACEHOLDER — replace with actual kubeseal output before first prod deploy.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: app-secrets
  namespace: atlas-platform
spec:
  encryptedData: {}
  template:
    metadata:
      name: app-secrets
      namespace: atlas-platform
    type: Opaque
