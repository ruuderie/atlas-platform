apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-ingress-uat
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
  - host: uat.atlas.oply.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: platform-admin
            port:
              number: 80
  - host: api.uat.atlas.oply.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
  - host: "*.buildwithruud.com"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: anchor-app
            port:
              number: 80
