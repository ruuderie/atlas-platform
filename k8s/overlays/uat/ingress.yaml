apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-ingress-uat
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
spec:
  tls:
  - hosts:
    - uat.atlas.oply.co
    - api.uat.atlas.oply.co
    secretName: uat-atlas-tls
  rules:
  - host: uat.atlas.oply.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: platform-admin
            port:
              number: 80
  - host: api.uat.atlas.oply.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
  - host: uat.buildwithruud.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: anchor-app
            port:
              number: 80
  - host: directory.uat.atlas.oply.co
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: directory-instance
            port:
              number: 80
