apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: uat
type: Opaque
stringData:
  # Base64 encoding not required in stringData
  # Ensure these match the user created in your local-config.nix
  POSTGRES_USER: "ruud"
  POSTGRES_PASSWORD: "YOUR_SECURE_PASSWORD"
  ADMIN_PASSWORD: "YOUR_ADMIN_PASSWORD"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: uat
data:
  ENVIRONMENT: "local"
  HOST: "0.0.0.0"
  PORT: "8000"
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "ruud"