apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: uat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DATABASE_NAME
        # Adding support for the multiple DB init script if needed,
        # but for local dev, we just need the main DB up.
        # Could mount testing init scripts if required later.
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: uat
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
