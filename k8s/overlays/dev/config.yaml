apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: atlas-platform
data:
  ENVIRONMENT: "dev"
  HOST: "0.0.0.0"
  PORT: "8000"
  DATABASE_HOST: "10.42.0.1"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "atlas_dev"
  ADMIN_FIRST_NAME: "Ruud"
  ADMIN_LAST_NAME: "Erie"
  ADMIN_PHONE: "+18608882536"
  ADMIN_USER: "billion_cornrow.7l@icloud.com"
  CREATE_ADMIN_ON_STARTUP: "true"
  API_URL: "https://api.dev.atlas.oply.co"
  ATLAS_API_URL: "http://backend.atlas-dev.svc.cluster.local:8000"
  INGRESS_SIDECAR_URL: "http://ingress-sidecar.atlas-dev.svc.cluster.local:8085"
  # PUBLIC_API_BASE_URL is injected into window.__ENV__ in the SSR shell so
  # client-side JS (passkey registration, etc.) knows the public backend URL.
  PUBLIC_API_BASE_URL: "https://api.dev.atlas.oply.co"
  FRONTEND_URL: "https://network.dev.atlas.oply.co"
  ADMIN_URL: "https://dev.atlas.oply.co"
  # Platform-first-party WebAuthn origin. Tenant custom domains are seeded at
  # startup from the app_domain table — do NOT add tenant domains here.
  WEBAUTHN_ORIGIN: "https://dev.atlas.oply.co"
  RP_ID: "atlas.oply.co"
  # CORS allowlist only — NOT a WebAuthn origin source.
  ADDITIONAL_ALLOWED_ORIGINS: "https://dev.buildwithruud.com"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: atlas-platform
type: Opaque
stringData:
  POSTGRES_USER: "REPLACE_WITH_DB_USER"
  POSTGRES_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
  ADMIN_PASSWORD: "REPLACE_WITH_ADMIN_PASSWORD"
  SMTP_TOKEN: "REPLACE_WITH_SMTP_TOKEN"
  SMTP_SERVER: "REPLACE_WITH_SMTP_SERVER"
  SMTP_PORT: "REPLACE_WITH_SMTP_PORT"
  SMTP_USERNAME: "REPLACE_WITH_SMTP_USERNAME"
  SMTP_FROM: "REPLACE_WITH_SMTP_FROM"
  # Bearer token required on Authorization: Bearer <token> header for GET /metrics.
  # Must match the bearer_token in the Prometheus scrape job in NixForge/flake.nix.
  METRICS_TOKEN: "REPLACE_WITH_METRICS_TOKEN"
  JWT_SECRET: "REPLACE_WITH_JWT_SECRET"
