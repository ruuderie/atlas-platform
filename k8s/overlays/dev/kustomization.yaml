apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atlas-dev

resources:
  - ../../base
  # namespace.yaml applied once by admin — not managed by CI
  - ingress.yaml
  - config.yaml
  # wildcard-cert.yaml is intentionally excluded from CI apply.
  # The Certificate is provisioned once and cert-manager auto-renews it.
  # To re-provision: kubectl apply -f k8s/overlays/dev/wildcard-cert.yaml
  #                  (requires admin credentials with cert-manager.io RBAC)

patches:
  - path: platform-admin-patch.yaml
  - path: backend-patch.yaml

# Only services with NO path filter (always-build) are safe to pin here.
# backend and anchor-app always build on every push.
# folio, platform-admin, network-instance are path-filtered — managed
# via kubectl set image in the deploy script (marker system).
images:
  - name: ghcr.io/ruuderie/atlas-backend
    newTag: "REPLACE_WITH_IMAGE_TAG"
  - name: ghcr.io/ruuderie/anchor-app
    newTag: "REPLACE_WITH_IMAGE_TAG"
