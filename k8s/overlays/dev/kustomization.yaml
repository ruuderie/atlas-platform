apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atlas-dev

resources:
  - ../../base
  # namespace.yaml applied once by admin — not managed by CI
  - ingress.yaml
  - config.yaml

patches:
  - path: platform-admin-patch.yaml
  - path: backend-patch.yaml

# Image updates are managed by the deploy script (kubectl rollout restart).
# kustomize handles: namespace, config, secrets, patches only.
