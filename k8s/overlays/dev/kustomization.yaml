apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: atlas-dev

resources:
  - ../../base
  # namespace.yaml applied once by admin — not managed by CI
  - ingress.yaml
  - config.yaml

patches:
  - path: platform-admin-patch.yaml
  - path: backend-patch.yaml

# Image tags are pinned per-environment to prevent cross-contamination.
# CI substitutes REPLACE_WITH_IMAGE_TAG with the actual commit SHA (${CI_COMMIT_SHA:0:8})
# IMPORTANT: newTag MUST be a quoted string. All-numeric SHAs (e.g. 13533692) are parsed
# as integers by YAML, causing: "cannot unmarshal number into Go struct field Image.images.newTag"
images:
  - name: ghcr.io/ruuderie/atlas-backend
    newTag: "REPLACE_WITH_IMAGE_TAG"
  - name: ghcr.io/ruuderie/anchor-app
    newTag: "REPLACE_WITH_IMAGE_TAG"
  - name: ghcr.io/ruuderie/folio
    newTag: "REPLACE_WITH_IMAGE_TAG"
  - name: ghcr.io/ruuderie/platform-admin
    newTag: "REPLACE_WITH_IMAGE_TAG"
  - name: ghcr.io/ruuderie/network-instance
    newTag: "REPLACE_WITH_IMAGE_TAG"
