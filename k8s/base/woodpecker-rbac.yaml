apiVersion: v1
kind: ServiceAccount
metadata:
  name: woodpecker-deployer
  # namespace is set by each overlay's namespace: transformer
  annotations:
    purpose: "CI/CD pipeline deployments — scoped to the overlay namespace only"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: woodpecker-deployer
  # namespace is set by each overlay's namespace: transformer
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    # watch+delete required so the deployer can apply ingress-sidecar-role which
    # grants those same verbs (Kubernetes RBAC escalation prevention).
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "create", "update", "patch"]
  # cert-manager.io — deployer must hold these to apply ingress-sidecar-role
  # which grants them to the sidecar ServiceAccount for cert cleanup on deprovision.
  # create/update/patch are required for `kubectl apply -k` to upsert the
  # wildcard-cert.yaml Certificate on every deployment run.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    # 'escalate' allows applying Role objects whose rules exceed the deployer's own
    # current grants — required when the target Role is updated to add new verbs.
    verbs: ["get", "list", "create", "update", "patch", "escalate", "bind"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: woodpecker-deployer
  # namespace is set by each overlay's namespace: transformer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: woodpecker-deployer
subjects:
  - kind: ServiceAccount
    name: woodpecker-deployer
    # Kustomize namespace transformer does NOT rewrite subjects[].namespace.
    # This must match the namespace where the SA lives (atlas-uat).
    # For cross-namespace bindings (e.g. atlas-dev), this is patched server-side.
    namespace: atlas-uat
---
# Long-lived token — after applying to a new namespace:
# kubectl get secret woodpecker-deployer-token -n <ns> -o jsonpath='{.data.token}' | base64 -d
# Store as Woodpecker CI secret: KUBE_DEPLOY_TOKEN
# Store CA as: KUBE_DEPLOY_CA
apiVersion: v1
kind: Secret
metadata:
  name: woodpecker-deployer-token
  # namespace is set by each overlay's namespace: transformer
  annotations:
    kubernetes.io/service-account.name: woodpecker-deployer
type: kubernetes.io/service-account-token
