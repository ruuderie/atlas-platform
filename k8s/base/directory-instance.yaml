apiVersion: apps/v1
kind: Deployment
metadata:
  name: directory-instance
  namespace: uat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: directory-instance
  template:
    metadata:
      labels:
        app: directory-instance
    spec:
      containers:
      - name: directory-instance
        image: ghcr.io/yourusername/business-directory-directory-instance:latest
        ports:
        - containerPort: 8080 # Different port to prevent conflict if run locally
        env:
        - name: ORIGIN
          value: "https://directory.yourdomain.com"
        - name: PORT
          value: "8080"
        # Example API binding
        - name: API_URL
          value: "http://backend.uat.svc.cluster.local:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: directory-instance
  namespace: uat
spec:
  selector:
    app: directory-instance
  ports:
  - port: 80
    targetPort: 8080
