apiVersion: apps/v1
kind: Deployment
metadata:
  name: directory-instance
spec:
  replicas: 2
  selector:
    matchLabels:
      app: directory-instance
  template:
    metadata:
      labels:
        app: directory-instance
    spec:
      imagePullSecrets:
      - name: ghcr-login-secret
      containers:
      - name: directory-instance
        image: ghcr.io/ruuderie/directory-instance:latest
        ports:
        - containerPort: 8080
        env:
        # Example API binding
        - name: API_URL
          value: "http://backend:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: directory-instance
spec:
  selector:
    app: directory-instance
  ports:
  - port: 80
    targetPort: 8080
