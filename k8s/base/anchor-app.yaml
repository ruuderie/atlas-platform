apiVersion: apps/v1
kind: Deployment
metadata:
  name: anchor-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anchor-app
  template:
    metadata:
      labels:
        app: anchor-app
    spec:
      imagePullSecrets:
      - name: ghcr-login-secret
      containers:
      - name: anchor-app
        image: ghcr.io/ruuderie/anchor-app:e089247e
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        ports:
        - containerPort: 3000
        # ── Leptos Runtime Configuration ─────────────────────────────────────
        # CRITICAL ARCHITECTURE REQUIREMENT — DO NOT REMOVE ANY OF THESE:
        # These env vars govern how the Axum/Leptos SSR server finds and injects
        # its WASM and JS assets. They MUST live here in the k8s manifest, NOT
        # only in the Dockerfile. Reason: `envFrom: configMapRef` merges the
        # ConfigMap into the container environment at pod start. Any variable NOT
        # explicitly listed in `env:` below is not guaranteed to survive.
        #
        # LEPTOS_HASH_FILES — must mirror `hash-files = true` in Cargo.toml.
        #   The compiler generates hashed filenames (e.g. anchor-a1b2c3d4.js).
        #   The SSR server ONLY injects the correct <script> tag if this is "true".
        #   If missing/false: server boots normally but serves dead static HTML with
        #   no JS/WASM loaded — ALL buttons silent, ALL reactive events dead.
        #
        # LEPTOS_SITE_ROOT — path where the compiled site/ directory was placed
        #   inside the container by the Dockerfile COPY step. Must match exactly.
        #
        # LEPTOS_SITE_ADDR — the host:port the Axum server binds to inside the pod.
        env:
        - name: DATABASE_URL
          value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
        - name: LEPTOS_SITE_ADDR
          value: "0.0.0.0:3000"
        - name: LEPTOS_SITE_ROOT
          value: "site"
        - name: LEPTOS_HASH_FILES
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: anchor-app
spec:
  selector:
    app: anchor-app
  ports:
  - port: 80
    targetPort: 3000
