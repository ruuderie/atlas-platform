apiVersion: apps/v1
kind: Deployment
metadata:
  name: anchor-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anchor-app
  template:
    metadata:
      labels:
        app: anchor-app
    spec:
      imagePullSecrets:
      - name: ghcr-login-secret
      containers:
      - name: anchor-app
        image: ghcr.io/ruuderie/anchor-app:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        ports:
        - containerPort: 3000
        # ── Leptos Runtime Configuration ─────────────────────────────────────
        # CRITICAL ARCHITECTURE REQUIREMENT — DO NOT REMOVE ANY OF THESE:
        # These env vars govern how the Axum/Leptos SSR server finds and serves
        # its WASM and JS assets.
        #
        # Cache-busting strategy: manual output-name versioning (anchor-v4).
        # When deploying a new WASM bundle, increment the suffix in Cargo.toml
        # (output-name) and in app.rs (<Stylesheet href="/pkg/anchor-vN.css"/>).
        #
        # LEPTOS_SITE_ROOT — path where the compiled site/ directory was placed
        #   inside the container by the Dockerfile COPY step. Must match exactly.
        #
        # LEPTOS_SITE_ADDR — the host:port the Axum server binds to inside the pod.
        env:
        - name: DATABASE_URL
          value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
        - name: LEPTOS_SITE_ADDR
          value: "0.0.0.0:3000"
        - name: LEPTOS_SITE_ROOT
          value: "site"
---
apiVersion: v1
kind: Service
metadata:
  name: anchor-app
spec:
  selector:
    app: anchor-app
  ports:
  - port: 80
    targetPort: 3000
