apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress-sidecar
  template:
    metadata:
      labels:
        app: ingress-sidecar
    spec:
      serviceAccountName: ingress-sidecar-sa
      imagePullSecrets:
      - name: ghcr-login-secret
      containers:
      - name: ingress-sidecar
        image: ghcr.io/ruuderie/atlas-ingress-sidecar:latest
        ports:
        - containerPort: 8085
        env:
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        readinessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingress-sidecar
spec:
  selector:
    app: ingress-sidecar
  ports:
  - name: http
    port: 8085
    targetPort: 8085
