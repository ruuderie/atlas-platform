apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingress-sidecar-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ingress-sidecar-role
rules:
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ingress-sidecar-rolebinding
subjects:
- kind: ServiceAccount
  name: ingress-sidecar-sa
roleRef:
  kind: Role
  name: ingress-sidecar-role
  apiGroup: rbac.authorization.k8s.io
