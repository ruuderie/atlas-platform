apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: atlas-backend
  labels:
    # Must match the Prometheus Operator's serviceMonitorSelector label
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: backend   # must match the label on your backend Service
  endpoints:
    - port: http     # must match the port name in your backend Service
      path: /metrics
      interval: 30s
  namespaceSelector:
    any: true
