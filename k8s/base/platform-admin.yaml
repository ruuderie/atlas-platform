apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-admin
  namespace: uat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-admin
  template:
    metadata:
      labels:
        app: platform-admin
    spec:
      containers:
      - name: platform-admin
        image: ghcr.io/yourusername/business-directory-platform-admin:latest
        ports:
        - containerPort: 8081 # Matches Trunk/Leptos
        env:
        - name: ORIGIN
          value: "https://uat.yourdomain.com"
        - name: PORT
          value: "8081"
---
apiVersion: v1
kind: Service
metadata:
  name: platform-admin
  namespace: uat
spec:
  selector:
    app: platform-admin
  ports:
  - port: 80
    targetPort: 8081