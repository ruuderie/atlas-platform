  # ── Deployment Markers ──────────────────────────────────────────────────────
  # We use these markers because Woodpecker's CI_PIPELINE_FILES variable is often
  # empty on large pushes, causing the deployment script to silently skip updates.
  # These steps natively use Woodpecker's robust path filtering to set flags.
  
  mark_backend_built:
    image: alpine
    commands: [ "touch .backend_built" ]
    when:
      branch: [dev, uat]

  mark_anchor_built:
    image: alpine
    commands: [ "touch .anchor_built" ]
    when:
      branch: [dev, uat]

  mark_network_built:
    image: alpine
    commands: [ "touch .network_built" ]
    when:
      branch: [dev, uat]
      path: [ "apps/network-instance/**", "apps/shared-ui/**", ".woodpecker.yml" ]

  mark_admin_built:
    image: alpine
    commands: [ "touch .admin_built" ]
    when:
      branch: [dev, uat]
      path: [ "apps/platform-admin/**", "apps/shared-ui/**", ".woodpecker.yml" ]

  mark_folio_built:
    image: alpine
    commands: [ "touch .folio_built" ]
    when:
      branch: [dev, uat]
      path: [ "apps/folio/**", ".woodpecker.yml" ]

  mark_sidecar_built:
    image: alpine
    commands: [ "touch .sidecar_built" ]
    when:
      branch: [dev, uat]
      path: [ "backend/src/bin/ingress_sidecar.rs", "backend/Dockerfile.sidecar", ".woodpecker.yml" ]

  # ── ONE-SHOT RBAC BOOTSTRAP ──────────────────────────────────────────────────
  # WHY: woodpecker-deployer doesn't have cluster-admin rights, so it can't create
  # the ClusterRole/Binding defined in k8s/base/woodpecker-rbac.yaml itself.
  # This step uses the K3s host kubeconfig (mounted read-only) to do it once.
  #
  # SAFE TO REMOVE when BOTH of the following are true in the same pipeline run:
  #   1. This step shows "✓ RBAC bootstrap complete" in its logs.
  #   2. deploy_platform_k8s completes without a Forbidden/RBAC error.
  # Once that happens, just tell me "remove bootstrap_rbac" and I'll delete the step.
  bootstrap_rbac:
    image: bitnami/kubectl:latest
    volumes:
      - /etc/rancher/k3s/k3s.yaml:/tmp/k3s-admin.yaml:ro
    commands:
      - |
        set -euo pipefail
        # The K3s admin kubeconfig uses 127.0.0.1:6443 which is the host's loopback.
        # Inside a container, 127.0.0.1 is the container's own loopback — not the host.
        # Parse /proc/net/route to get the default gateway without needing iproute2.
        # The Gateway column is hex, little-endian (e.g. 0101A8C0 → 192.168.1.1).
        HEX_GW=$(awk 'NR>1 && $2=="00000000" { print $3; exit }' /proc/net/route)
        HOST_IP=$(printf '%d.%d.%d.%d' \
          "0x${HEX_GW:6:2}" "0x${HEX_GW:4:2}" \
          "0x${HEX_GW:2:2}" "0x${HEX_GW:0:2}")
        echo "==> Host gateway IP: $HOST_IP"
        sed "s|https://127.0.0.1:6443|https://$HOST_IP:6443|g" /tmp/k3s-admin.yaml > /tmp/k3s-admin-fixed.yaml
        export KUBECONFIG=/tmp/k3s-admin-fixed.yaml
        # Verify connectivity before proceeding
        kubectl cluster-info
        echo "==> Bootstrapping woodpecker-deployer RBAC in atlas-dev..."
        kubectl apply -f k8s/base/woodpecker-rbac.yaml -n atlas-dev
        echo "==> Bootstrapping woodpecker-deployer RBAC in atlas-uat..."
        kubectl apply -f k8s/base/woodpecker-rbac.yaml -n atlas-uat
        echo "✓ RBAC bootstrap complete — this step can be removed once confirmed working."
    when:
      branch: [dev, uat]

  # ── Unified CD Deployment ───────────────────────────────────────────────────
  deploy_platform_k8s:
    image: bitnami/kubectl:latest
    environment:
      ATLAS_INIT_TOKEN:
        from_secret: ATLAS_INIT_TOKEN
      DB_USER:
        from_secret: db_user
      DB_PASSWORD:
        from_secret: db_password
      ADMIN_PASSWORD:
        from_secret: admin_password
      SMTP_TOKEN:
        from_secret: SMTP_TOKEN
      SMTP_SERVER:
        from_secret: SMTP_SERVER
      SMTP_PORT:
        from_secret: SMTP_PORT
      SMTP_USERNAME:
        from_secret: SMTP_USERNAME
      SMTP_FROM:
        from_secret: SMTP_FROM
      METRICS_TOKEN:
        from_secret: METRICS_TOKEN
      JWT_SECRET:
        from_secret: JWT_SECRET
      KUBE_DEPLOY_TOKEN:
        from_secret: KUBE_DEPLOY_TOKEN
      KUBE_DEPLOY_CA:
        from_secret: KUBE_DEPLOY_CA
      KUBE_SERVER:
        from_secret: KUBE_SERVER
    commands:
      - |
        set -euo pipefail

        mkdir -p /tmp/kube
        export KUBECONFIG=/tmp/kube/config
        echo "$KUBE_DEPLOY_CA" | base64 -d > /tmp/kube/ca.crt
        kubectl config set-cluster atlas \
          --server="$KUBE_SERVER" \
          --certificate-authority=/tmp/kube/ca.crt \
          --embed-certs=true
        kubectl config set-credentials woodpecker-deployer \
          --token="$KUBE_DEPLOY_TOKEN"
        kubectl config set-context atlas \
          --cluster=atlas \
          --user=woodpecker-deployer \
          --namespace=atlas-uat
        kubectl config use-context atlas

        case "$CI_COMMIT_BRANCH" in
          uat)          NAMESPACE="atlas-uat" ;;
          dev)          NAMESPACE="atlas-dev" ;;
          main|master)
            echo "ERROR: Production deployment is not yet enabled."
            echo "To enable: add main/master to the global 'when: branch:' trigger"
            echo "and create the atlas-prod namespace + overlay first."
            exit 1
            ;;
          *)
            echo "ERROR: Branch '$CI_COMMIT_BRANCH' is not authorised to deploy."
            exit 1
            ;;
        esac

        kubectl get namespace "$NAMESPACE"
        echo "✓ Connected to K8s API — target: $NAMESPACE"
        echo "Push branch: $CI_COMMIT_BRANCH | commit: $CI_COMMIT_SHA"

        SHORT_SHA="${CI_COMMIT_SHA:0:8}"
        echo "Deploying images tagged :$SHORT_SHA"

        case "$CI_COMMIT_BRANCH" in
          uat)
            echo "Deploying to UAT (atlas-uat)..."

            for secret_name in ATLAS_INIT_TOKEN DB_USER DB_PASSWORD ADMIN_PASSWORD SMTP_TOKEN SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_FROM METRICS_TOKEN JWT_SECRET; do
              secret_value=$(printenv "$secret_name" || echo "")
              # Strip newlines and carriage returns that break sed
              secret_value=$(echo -n "$secret_value" | tr -d '\n\r')
              if [ -z "$secret_value" ]; then
                echo "FATAL ERROR: CI Secret '$secret_name' missing! UAT deployment aborted."
                exit 1
              fi
              export "$secret_name"="$secret_value"
            done

            sed -i "s|REPLACE_WITH_CI_TOKEN|$ATLAS_INIT_TOKEN|g" k8s/overlays/uat/backend-patch.yaml
            sed -i "s|REPLACE_WITH_DB_USER|$DB_USER|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_DB_PASSWORD|$DB_PASSWORD|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_TOKEN|$SMTP_TOKEN|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_SERVER|$SMTP_SERVER|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_PORT|$SMTP_PORT|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_USERNAME|$SMTP_USERNAME|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_FROM|$SMTP_FROM|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_METRICS_TOKEN|$METRICS_TOKEN|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_JWT_SECRET|$JWT_SECRET|g" k8s/overlays/uat/config.yaml
            # Pin images to the exact SHA built from this commit
            IMAGE_TAG=$(echo "$CI_COMMIT_SHA" | cut -c1-8)
            sed -i "s|REPLACE_WITH_IMAGE_TAG|$IMAGE_TAG|g" k8s/overlays/uat/kustomization.yaml
            kubectl apply -k k8s/overlays/uat
            ;;

          dev)
            echo "Deploying to DEV (atlas-dev / dev.buildwithruud.com)..."

            for secret_name in ATLAS_INIT_TOKEN DB_USER DB_PASSWORD ADMIN_PASSWORD SMTP_TOKEN SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_FROM METRICS_TOKEN JWT_SECRET; do
              secret_value=$(printenv "$secret_name" || echo "")
              # Strip newlines and carriage returns that break sed
              secret_value=$(echo -n "$secret_value" | tr -d '\n\r')
              if [ -z "$secret_value" ]; then
                echo "FATAL ERROR: CI Secret '$secret_name' missing! Dev deployment aborted."
                exit 1
              fi
              export "$secret_name"="$secret_value"
            done

            sed -i "s|REPLACE_WITH_CI_TOKEN|$ATLAS_INIT_TOKEN|g" k8s/overlays/dev/backend-patch.yaml
            sed -i "s|REPLACE_WITH_DB_USER|$DB_USER|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_DB_PASSWORD|$DB_PASSWORD|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_TOKEN|$SMTP_TOKEN|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_SERVER|$SMTP_SERVER|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_PORT|$SMTP_PORT|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_USERNAME|$SMTP_USERNAME|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_FROM|$SMTP_FROM|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_METRICS_TOKEN|$METRICS_TOKEN|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_JWT_SECRET|$JWT_SECRET|g" k8s/overlays/dev/config.yaml
            # Pin images to the exact SHA built from this commit
            IMAGE_TAG=$(echo "$CI_COMMIT_SHA" | cut -c1-8)
            sed -i "s|REPLACE_WITH_IMAGE_TAG|$IMAGE_TAG|g" k8s/overlays/dev/kustomization.yaml
            kubectl apply -k k8s/overlays/dev
            ;;

          *)
            echo "ERROR: Branch '$CI_COMMIT_BRANCH' is not authorised to deploy."
            exit 1
            ;;
        esac

        REGISTRY="ghcr.io/ruuderie"

        # For services that built this run: pin to the exact SHA for traceability.
        # Any service that didn't build this run still gets restarted below (re-pulls :latest).
        if [ -f .backend_built ]; then
          echo "==> Pinning backend to :$SHORT_SHA"
          kubectl set image deployment/backend \
            $(kubectl get deployment/backend -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].name}')=$REGISTRY/atlas-backend:$SHORT_SHA \
            -n $NAMESPACE
        fi
        if [ -f .anchor_built ]; then
          echo "==> Pinning anchor-app to :$SHORT_SHA"
          kubectl set image deployment/anchor-app \
            $(kubectl get deployment/anchor-app -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].name}')=$REGISTRY/anchor-app:$SHORT_SHA \
            -n $NAMESPACE
        fi
        if [ -f .network_built ]; then
          echo "==> Pinning network-instance to :$SHORT_SHA"
          kubectl set image deployment/network-instance \
            $(kubectl get deployment/network-instance -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].name}')=$REGISTRY/network-instance:$SHORT_SHA \
            -n $NAMESPACE
        fi
        if [ -f .admin_built ]; then
          echo "==> Pinning platform-admin to :$SHORT_SHA"
          kubectl set image deployment/platform-admin \
            $(kubectl get deployment/platform-admin -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].name}')=$REGISTRY/platform-admin:$SHORT_SHA \
            -n $NAMESPACE
        fi
        if [ -f .folio_built ]; then
          echo "==> Pinning folio to :$SHORT_SHA"
          kubectl set image deployment/folio \
            $(kubectl get deployment/folio -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].name}')=$REGISTRY/folio:$SHORT_SHA \
            -n $NAMESPACE
        fi
        if [ -f .sidecar_built ]; then
          echo "==> Pinning ingress-sidecar to :$SHORT_SHA"
          kubectl set image deployment/ingress-sidecar \
            $(kubectl get deployment/ingress-sidecar -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].name}')=$REGISTRY/atlas-ingress-sidecar:$SHORT_SHA \
            -n $NAMESPACE
        fi

        # Always restart ALL deployments on every push.
        # Services that built get the new SHA (set above). Services that didn't build
        # re-pull :latest (imagePullPolicy: Always), ensuring every pod is always fresh.
        echo "==> Restarting all deployments in $NAMESPACE..."
        for DEPLOY in backend anchor-app network-instance platform-admin folio; do
          kubectl rollout restart deployment/$DEPLOY -n $NAMESPACE 2>/dev/null \
            && echo "    ↺ $DEPLOY restarting" \
            || echo "    ⚠ $DEPLOY not found — skipping"
        done

        # Wait for all rollouts to stabilise
        FAILED=0
        for DEPLOY in backend anchor-app network-instance platform-admin folio; do
          kubectl rollout status deployment/$DEPLOY -n $NAMESPACE --timeout=180s || {
            echo "===== LOGS: $DEPLOY ====="
            kubectl logs -n $NAMESPACE -l app=$DEPLOY --tail=100 --all-containers=true
            FAILED=1
          }
          kubectl get deployment/$DEPLOY -n $NAMESPACE -o jsonpath='==> {.metadata.name}: {.spec.template.spec.containers[0].image} ✓\n'
        done
        [ "$FAILED" -eq 0 ] || exit 1

        echo "Deployment complete. Commit $SHORT_SHA is live."


  # ── Post-Deploy Smoke Test ──────────────────────────────────────────────────
  # Hits the /health endpoint on each environment after deploy and fails the
  # pipeline if the new pod is not serving a 200. This catches a new image
  # that crashes on startup before anyone notices via the browser.
  smoke_test_dev:
    image: curlimages/curl:latest
    commands:
      - |
        echo "Smoke testing dev.buildwithruud.com ..."
        sleep 15  # Give the rollout a moment to settle
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dev.buildwithruud.com/api/health --max-time 20 || echo "000")
        if [ "$STATUS" != "200" ]; then
          echo "SMOKE TEST FAILED — /api/health returned HTTP $STATUS (expected 200)"
          echo "The new pod may have crashed. Check: kubectl logs -n atlas-dev -l app=anchor-app --tail=50"
          exit 1
        fi
        echo "✓ Smoke test passed — dev is healthy (HTTP $STATUS)"
    failure: ignore
    when:
      branch: dev
      path:
        - 'apps/anchor/**'
        - 'apps/shared-ui/**'
        - 'backend/**'

  annotate_grafana_dev:
    image: curlimages/curl:latest
    environment:
      GRAFANA_URL: "https://grafana.oply.co"
      GRAFANA_TOKEN:
        from_secret: grafana_token
    commands:
      - |
        SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-8)
        curl -s -X POST $GRAFANA_URL/api/annotations \
          -H "Authorization: Bearer $GRAFANA_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "time": '$(date +%s%3N)',
            "tags": ["deploy", "atlas-dev", "'$SHORT_SHA'"],
            "text": "Deployed atlas-dev commit '$SHORT_SHA'"
          }'
    failure: ignore
    when:
      branch: dev
      path:
        - 'apps/anchor/**'
        - 'apps/shared-ui/**'
        - 'backend/**'

  # ── Notifications (Best Practice) ───────────────────────────────────────────
  notify_telegram_success:
    image: appleboy/drone-telegram
    settings:
      token:
        from_secret: TELEGRAM_BOT_TOKEN
      to:
        from_secret: TELEGRAM_CHAT_ID
      format: markdown
      message: >
        🎉 *Atlas Platform Deployment SUCCESS* 🎉
        Pipeline #${CI_PIPELINE_NUMBER} completed successfully!
        Branch: `${CI_COMMIT_BRANCH}` | Commit: `${CI_COMMIT_SHA}`
        [View Logs](${CI_PIPELINE_URL})
    when:
      - status: [success]
        event: [push]

  notify_telegram_failure:
    image: appleboy/drone-telegram
    settings:
      token:
        from_secret: TELEGRAM_BOT_TOKEN
      to:
        from_secret: TELEGRAM_CHAT_ID
      format: markdown
      message: >
        🚨 💥 *Atlas Platform Deployment FAILED* 💥 🚨
        Pipeline #${CI_PIPELINE_NUMBER} failed.
        Branch: `${CI_COMMIT_BRANCH}` | Commit: `${CI_COMMIT_SHA}`
        [View Logs](${CI_PIPELINE_URL})
    when:
      - status: [failure]
        event: [push]

  notify_email_success:
    image: drillster/drone-email
    settings:
      host:
        from_secret: SMTP_SERVER
      port:
        from_secret: SMTP_PORT
      username:
        from_secret: SMTP_USERNAME
      password:
        from_secret: SMTP_TOKEN
      from:
        from_secret: SMTP_FROM
      recipients:
        from_secret: NOTIFICATION_EMAIL
      recipients_only: true
      subject: >
        [Atlas CI] 🎉 SUCCESS — Pipeline #${CI_PIPELINE_NUMBER}
      body: |
        <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e1e4e8; border-radius: 6px;">
          <h2 style="color: #24292e; margin-top: 0; border-bottom: 1px solid #eaecef; padding-bottom: 10px;">Atlas Platform Deployment Report</h2>
          
          <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
            <tr><td style="padding: 8px 0; font-weight: bold; width: 100px;">Status:</td><td><span style="color: #28a745; font-weight: bold; text-transform: uppercase;">✅ SUCCESS 🎉</span></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Project:</td><td>${CI_REPO_OWNER}/${CI_REPO_NAME}</td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Branch:</td><td><span style="background: #f1f8ff; padding: 3px 6px; border-radius: 3px; font-family: monospace;">${CI_COMMIT_BRANCH}</span></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Commit:</td><td><a href="${CI_REPO_URL}/commit/${CI_COMMIT_SHA}" style="color: #0366d6; text-decoration: none; font-family: monospace;">${CI_COMMIT_SHA}</a></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Message:</td><td><em>${CI_COMMIT_MESSAGE}</em></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Author:</td><td>${CI_COMMIT_AUTHOR}</td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Logs:</td><td><a href="${CI_PIPELINE_URL}" style="color: #0366d6; text-decoration: none;">View Pipeline #${CI_PIPELINE_NUMBER}</a></td></tr>
          </table>

          <div style="margin-top: 25px; padding: 15px; border-radius: 3px; background-color: #dcffe4; color: #1a7f37;">
            <strong>✅ Deployment completed successfully! All systems are go. 🚀</strong>
          </div>
        </div>
    when:
      - status: [success]
        event: [push]

  notify_email_failure:
    image: drillster/drone-email
    settings:
      host:
        from_secret: SMTP_SERVER
      port:
        from_secret: SMTP_PORT
      username:
        from_secret: SMTP_USERNAME
      password:
        from_secret: SMTP_TOKEN
      from:
        from_secret: SMTP_FROM
      recipients:
        from_secret: NOTIFICATION_EMAIL
      recipients_only: true
      subject: >
        [Atlas CI] 🚨 FAILURE — Pipeline #${CI_PIPELINE_NUMBER}
      body: |
        <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e1e4e8; border-radius: 6px;">
          <h2 style="color: #24292e; margin-top: 0; border-bottom: 1px solid #eaecef; padding-bottom: 10px;">Atlas Platform Deployment Report</h2>
          
          <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
            <tr><td style="padding: 8px 0; font-weight: bold; width: 100px;">Status:</td><td><span style="color: #cb2431; font-weight: bold; text-transform: uppercase;">🚨 FAILURE 💥</span></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Project:</td><td>${CI_REPO_OWNER}/${CI_REPO_NAME}</td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Branch:</td><td><span style="background: #f1f8ff; padding: 3px 6px; border-radius: 3px; font-family: monospace;">${CI_COMMIT_BRANCH}</span></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Commit:</td><td><a href="${CI_REPO_URL}/commit/${CI_COMMIT_SHA}" style="color: #0366d6; text-decoration: none; font-family: monospace;">${CI_COMMIT_SHA}</a></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Message:</td><td><em>${CI_COMMIT_MESSAGE}</em></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Author:</td><td>${CI_COMMIT_AUTHOR}</td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Logs:</td><td><a href="${CI_PIPELINE_URL}" style="color: #0366d6; text-decoration: none;">View Pipeline #${CI_PIPELINE_NUMBER}</a></td></tr>
          </table>

          <div style="margin-top: 25px; padding: 15px; border-radius: 3px; background-color: #ffeef0; color: #b31d28;">
            <strong>❌ Deployment FAILED. Please investigate immediately! 🛠️</strong>
          </div>
        </div>
    when:
      - status: [failure]
        event: [push]

  cleanup_workspace:
    image: alpine
    commands:
      - rm -rf target/ || true
    when:
      - status: [success, failure]
        event: [push]
# Trigger full rebuild for K8s base manifest fix
