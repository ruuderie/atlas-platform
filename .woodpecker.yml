when:
  - event: [push]
    branch:
      - uat
      - main
      - master

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oplydbtest

steps:
  test_workspace:
    image: rust:slim
    environment:
      TEST_DATABASE_URL: postgres://postgres:postgres@database:5432/oplydbtest
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev postgresql-client
      - |
        echo "Waiting for database to initialize..."
        until pg_isready -h database -p 5432 -U postgres; do
          sleep 2
        done
      - cd backend && cargo test --workspace -j 1 -- --test-threads=1

  # ── Docker Build & Push ─────────────────────────────────────────────────────
  # Each publish step tags the image with both :latest AND the short commit SHA
  # (first 8 chars of CI_COMMIT_SHA). This eliminates the :latest race condition
  # where kubectl might pull a stale image if the push hasn't completed yet.
  # The deploy step uses the SHA tag for the rollout so Kubernetes always pins
  # the exact commit that this pipeline built.

  publish_platform_admin:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/platform-admin
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/platform-admin/Dockerfile
      build_args:
        - ATLAS_BUILD_SHA=${CI_COMMIT_SHA}
        - ATLAS_BUILD_DATE=${CI_PIPELINE_CREATED}
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      path:
        - 'apps/platform-admin/**'
        - '.woodpecker.yml'

  publish_backend:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/atlas-backend
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: backend
      dockerfile: backend/Dockerfile
      build_args:
        - ATLAS_BUILD_SHA=${CI_COMMIT_SHA}
        - ATLAS_BUILD_DATE=${CI_PIPELINE_CREATED}
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      path:
        - 'backend/**'
        - '.woodpecker.yml'

  publish_network_instance:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/network-instance
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/network-instance/Dockerfile
      build_args:
        - ATLAS_BUILD_SHA=${CI_COMMIT_SHA}
        - ATLAS_BUILD_DATE=${CI_PIPELINE_CREATED}
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      path:
        - 'apps/network-instance/**'
        - '.woodpecker.yml'

  publish_anchor:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/anchor-app
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/anchor/Dockerfile
      build_args:
        - ATLAS_BUILD_SHA=${CI_COMMIT_SHA}
        - ATLAS_BUILD_DATE=${CI_PIPELINE_CREATED}
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      path:
        - 'apps/anchor/**'
        - '.woodpecker.yml'

  # ── Unified CD Deployment ───────────────────────────────────────────────────
  # Injects secrets, applies Kustomize overlays, then performs a SCOPED rollout:
  # only the deployments whose source paths changed in this commit are restarted.
  # This avoids unnecessary pod churn and makes it unambiguous which service
  # caused a problem if a rollout fails.
  #
  # The SHA-tagged image is patched into each deployment's container spec via
  # kubectl set image — this guarantees the pod pulls the exact image built by
  # this pipeline run, not a racy :latest that may still be uploading.
  deploy_platform_k8s:
    image: bitnami/kubectl:latest
    volumes:
      - /etc/rancher/k3s/k3s.yaml:/kubeconfig.yaml:ro
    environment:
      ATLAS_INIT_TOKEN:
        from_secret: ATLAS_INIT_TOKEN
      DB_USER:
        from_secret: db_user
      DB_PASSWORD:
        from_secret: db_password
      ADMIN_PASSWORD:
        from_secret: admin_password
      SMTP_TOKEN:
        from_secret: SMTP_TOKEN
      SMTP_SERVER:
        from_secret: SMTP_SERVER
      SMTP_PORT:
        from_secret: SMTP_PORT
      SMTP_USERNAME:
        from_secret: SMTP_USERNAME
      SMTP_FROM:
        from_secret: SMTP_FROM
    commands:
      - set -euo pipefail
      - export KUBECONFIG=/tmp/kubeconfig.yaml
      - cp /kubeconfig.yaml /tmp/kubeconfig.yaml
      - sed -i 's/127.0.0.1/host.docker.internal/g' /tmp/kubeconfig.yaml
      - kubectl cluster-info
      - echo "Push branch is $CI_COMMIT_BRANCH, commit is $CI_COMMIT_SHA"

      # Short SHA used for image tagging (matches publish steps above)
      - SHORT_SHA="${CI_COMMIT_SHA:0:8}"
      - echo "Deploying images tagged :$SHORT_SHA"

      - |
        if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "master" ]; then
          echo "Deploying to PROD environment..."

          # Validate all required secrets exist before touching prod
          for secret_name in ATLAS_INIT_TOKEN DB_USER DB_PASSWORD ADMIN_PASSWORD SMTP_TOKEN SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_FROM; do
            secret_value=$(printenv "$secret_name" || echo "")
            if [ -z "$secret_value" ]; then
              echo "FATAL ERROR: CI Secret '$secret_name' is empty or missing! Prod deployment aborted."
              exit 1
            fi
          done

          # Ensure atlas_prod database exists on the host (idempotent)
          PGPASSWORD="$DB_PASSWORD" psql -h 10.42.0.1 -U "$DB_USER" -d postgres \
            -c "SELECT 'CREATE DATABASE atlas_prod OWNER $DB_USER' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname='atlas_prod')\gexec" || true

          # Inject the commit SHA into base manifests so kubectl apply deploys the exact image
          sed -i "s|ATLAS_IMAGE_TAG|$SHORT_SHA|g" k8s/base/anchor-app.yaml
          sed -i "s|ATLAS_IMAGE_TAG|$SHORT_SHA|g" k8s/base/backend.yaml
          sed -i "s|ATLAS_IMAGE_TAG|$SHORT_SHA|g" k8s/base/platform-admin.yaml
          sed -i "s|ATLAS_IMAGE_TAG|$SHORT_SHA|g" k8s/base/network-instance.yaml

          sed -i "s|REPLACE_WITH_CI_TOKEN|$ATLAS_INIT_TOKEN|g" k8s/overlays/prod/backend-patch.yaml
          sed -i "s|REPLACE_WITH_DB_USER|$DB_USER|g" k8s/overlays/prod/config.yaml
          sed -i "s|REPLACE_WITH_DB_PASSWORD|$DB_PASSWORD|g" k8s/overlays/prod/config.yaml
          sed -i "s|REPLACE_WITH_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" k8s/overlays/prod/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_TOKEN|$SMTP_TOKEN|g" k8s/overlays/prod/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_SERVER|$SMTP_SERVER|g" k8s/overlays/prod/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_PORT|$SMTP_PORT|g" k8s/overlays/prod/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_USERNAME|$SMTP_USERNAME|g" k8s/overlays/prod/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_FROM|$SMTP_FROM|g" k8s/overlays/prod/config.yaml

          kubectl apply -k k8s/overlays/prod
          OVERLAY="prod"
        else
          echo "Deploying to UAT environment..."

          # Strictly validate existence of required secrets so CI fails loudly
          for secret_name in ATLAS_INIT_TOKEN DB_USER DB_PASSWORD ADMIN_PASSWORD SMTP_TOKEN SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_FROM; do
            secret_value=$(printenv "$secret_name" || echo "")
            if [ -z "$secret_value" ]; then
              echo "FATAL ERROR: CI Secret '$secret_name' is empty or missing! Deployment aborted."
              exit 1
            fi
          done

          # Inject the commit SHA into base manifests so kubectl apply deploys the exact image
          sed -i "s|ATLAS_IMAGE_TAG|$SHORT_SHA|g" k8s/base/anchor-app.yaml
          sed -i "s|ATLAS_IMAGE_TAG|$SHORT_SHA|g" k8s/base/backend.yaml
          sed -i "s|ATLAS_IMAGE_TAG|$SHORT_SHA|g" k8s/base/platform-admin.yaml
          sed -i "s|ATLAS_IMAGE_TAG|$SHORT_SHA|g" k8s/base/network-instance.yaml

          sed -i "s|REPLACE_WITH_CI_TOKEN|$ATLAS_INIT_TOKEN|g" k8s/overlays/uat/backend-patch.yaml
          sed -i "s|REPLACE_WITH_DB_USER|$DB_USER|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_DB_PASSWORD|$DB_PASSWORD|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_TOKEN|$SMTP_TOKEN|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_SERVER|$SMTP_SERVER|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_PORT|$SMTP_PORT|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_USERNAME|$SMTP_USERNAME|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_FROM|$SMTP_FROM|g" k8s/overlays/uat/config.yaml

          kubectl apply -k k8s/overlays/uat
          OVERLAY="uat"
        fi

      # ── Scoped rollout: only update pods whose source changed ───────────────
      # git diff against the previous commit to determine which services need
      # a rollout. For .woodpecker.yml changes (pipeline infra), update all services
      # since any step could have been modified.
      - |
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
        echo "Changed paths: $CHANGED"

        # Helper: wait for a deployment rollout to complete and tail logs on failure
        rollout_service() {
          local DEPLOY=$1
          echo "==> Verifying rollout: $DEPLOY"
          kubectl rollout status deployment/$DEPLOY -n atlas-platform --timeout=180s || {
            echo "===== LOGS: $DEPLOY ====="
            kubectl logs -n atlas-platform -l app=$DEPLOY --tail=100 --all-containers=true
            exit 1
          }
          echo "==> $DEPLOY is live on $SHORT_SHA ✓"
        }

        # Detect pipeline-wide change (woodpecker.yml itself) → restart all
        if echo "$CHANGED" | grep -q "\.woodpecker\.yml"; then
          echo "Pipeline config changed — rolling out all services."
          rollout_service backend
          rollout_service platform-admin
          rollout_service network-instance
          rollout_service anchor-app
        else
          # Service-scoped rollouts — only restart what changed
          if echo "$CHANGED" | grep -qE "^backend/"; then
            rollout_service backend
          fi
          if echo "$CHANGED" | grep -qE "^apps/platform-admin/"; then
            rollout_service platform-admin
          fi
          if echo "$CHANGED" | grep -qE "^apps/network-instance/"; then
            rollout_service network-instance
          fi
          if echo "$CHANGED" | grep -qE "^apps/anchor/"; then
            rollout_service anchor-app
          fi
        fi

        echo "Deployment complete. Commit $SHORT_SHA is live."

  # ── Notifications ───────────────────────────────────────────────────────────
  notify_discord:
    image: appleboy/drone-discord
    failure: ignore
    settings:
      webhook_id: ${DISCORD_WEBHOOK_ID:-ignored}
      webhook_token: ${DISCORD_WEBHOOK_TOKEN:-ignored}
      message: >
        **Atlas Platform Deployment**
        {{#success build.status}}
          ✅ Pipeline #{{build.number}} successfully compiled and deployed all unified monorepo applications!
        {{else}}
          ❌ Pipeline #{{build.number}} failed during phase `{{build.failed_steps}}`.
        {{/success}}
        *Pipeline Logs:* {{build.link}}
    when:
      - status: [success, failure]
        event: [push]

  notify_email:
    image: drillster/drone-email
    failure: ignore
    settings:
      host:
        from_secret: SMTP_SERVER
      port:
        from_secret: SMTP_PORT
      username:
        from_secret: SMTP_USERNAME
      password:
        from_secret: SMTP_TOKEN
      from:
        from_secret: SMTP_FROM
      recipients:
        from_secret: NOTIFICATION_EMAIL
      recipients_only: true
      subject: "[Atlas CI] Pipeline #{{build.number}} results: {{build.status}}"
      body: |
        Atlas Platform Deployment Status
        ------------------------------------
        Status: {{build.status}}
        Project: {{repo.owner}}/{{repo.name}}
        Branch: {{build.branch}}
        Commit: {{build.commit}} - {{commit.message}}
        Requested By: {{build.author}}

        Failed Steps: {{build.failed_steps}}

        Logs Available At: {{build.link}}
    when:
      - status: [success, failure]
        event: [push]

  # ── Workspace Cleanup ───────────────────────────────────────────────────────
  cleanup_workspace:
    image: alpine
    commands:
      - rm -rf target/ || true
    when:
      - status: [success, failure]
        event: [push]

# Trigger full pipeline run
