when:
  - event: [push]
    branch:
      - uat
      - dev

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oplydbtest

steps:
  # ── Optimized Test Step (Staff Engineer Best Practice) ─────────────────────
  test_workspace:
    image: rust:1.85-slim
    environment:
      TEST_DATABASE_URL: postgres://postgres:postgres@database:5432/oplydbtest
      CARGO_INCREMENTAL: "1"
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev postgresql-client mold
      - |
        echo "Waiting for database to initialize..."
        until pg_isready -h database -p 5432 -U postgres; do
          sleep 2
        done

      # Restore cargo and target cache (major speed improvement)
      - |
        mkdir -p /cache/cargo /cache/target
        if [ -d /cache/cargo ]; then
          cp -r /cache/cargo $CARGO_HOME 2>/dev/null || true
        fi
        if [ -d /cache/target ]; then
          cp -r /cache/target ./target 2>/dev/null || true
        fi

      # Run tests with full parallelism
      - cd backend && cargo test --workspace -j $(nproc) -- --test-threads=$(nproc)

      # Save cache for next run
      - |
        cp -r $CARGO_HOME /cache/cargo 2>/dev/null || true
        cp -r ./target /cache/target 2>/dev/null || true

  # ── Docker Build & Push ─────────────────────────────────────────────────────
  publish_platform_admin_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/platform-admin
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/platform-admin/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'apps/platform-admin/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_platform_admin_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/platform-admin
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/platform-admin/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'apps/platform-admin/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_backend_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/atlas-backend
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: backend
      dockerfile: backend/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'backend/**'
        - '.woodpecker.yml'

  publish_backend_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/atlas-backend
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: backend
      dockerfile: backend/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'backend/**'
        - '.woodpecker.yml'

  publish_network_instance_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/network-instance
      tags:
