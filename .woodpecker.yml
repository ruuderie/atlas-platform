when:
  - event: [push]
    branch:
      - uat
      - dev
      # main/master intentionally excluded — production not yet enabled.
      # Add them back here when atlas-prod is ready to go live.

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oplydbtest

steps:
  test_workspace:
    image: rust:slim
    environment:
      TEST_DATABASE_URL: postgres://postgres:postgres@database:5432/oplydbtest
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev postgresql-client
      - |
        echo "Waiting for database to initialize..."
        until pg_isready -h database -p 5432 -U postgres; do
          sleep 2
        done
      - cd backend && cargo test --workspace -j 1 -- --test-threads=1

  # ── Docker Build & Push ─────────────────────────────────────────────────────
  # Each publish step tags the image with both :latest AND the short commit SHA
  # (first 8 chars of CI_COMMIT_SHA). This eliminates the :latest race condition
  # where kubectl might pull a stale image if the push hasn't completed yet.
  # The deploy step uses the SHA tag for the rollout so Kubernetes always pins
  # the exact commit that this pipeline built.

  # platform-admin — debug on dev, release on uat
  publish_platform_admin_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/platform-admin
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/platform-admin/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'apps/platform-admin/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_platform_admin_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/platform-admin
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/platform-admin/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'apps/platform-admin/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  # backend — debug on dev, release on uat
  publish_backend_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/atlas-backend
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: backend
      dockerfile: backend/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'backend/**'
        - '.woodpecker.yml'

  publish_backend_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/atlas-backend
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: backend
      dockerfile: backend/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'backend/**'
        - '.woodpecker.yml'

  # network-instance — debug on dev, release on uat
  publish_network_instance_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/network-instance
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/network-instance/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'apps/network-instance/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_network_instance_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/network-instance
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/network-instance/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'apps/network-instance/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  # anchor — debug on dev, release on uat
  publish_anchor_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/anchor-app
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/anchor/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'apps/anchor/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_anchor_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/anchor-app
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/anchor/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'apps/anchor/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  # ── Unified CD Deployment ───────────────────────────────────────────────────
  # Injects secrets, applies Kustomize overlays, then performs a SCOPED rollout:
  # only the deployments whose source paths changed in this commit are restarted.
  # This avoids unnecessary pod churn and makes it unambiguous which service
  # caused a problem if a rollout fails.
  #
  # The SHA-tagged image is patched into each deployment's container spec via
  # kubectl set image — this guarantees the pod pulls the exact image built by
  # this pipeline run, not a racy :latest that may still be uploading.
  deploy_platform_k8s:
    image: bitnami/kubectl:latest
    environment:
      ATLAS_INIT_TOKEN:
        from_secret: ATLAS_INIT_TOKEN
      DB_USER:
        from_secret: db_user
      DB_PASSWORD:
        from_secret: db_password
      ADMIN_PASSWORD:
        from_secret: admin_password
      SMTP_TOKEN:
        from_secret: SMTP_TOKEN
      SMTP_SERVER:
        from_secret: SMTP_SERVER
      SMTP_PORT:
        from_secret: SMTP_PORT
      SMTP_USERNAME:
        from_secret: SMTP_USERNAME
      SMTP_FROM:
        from_secret: SMTP_FROM
      KUBE_DEPLOY_TOKEN:
        from_secret: KUBE_DEPLOY_TOKEN
      KUBE_DEPLOY_CA:
        from_secret: KUBE_DEPLOY_CA
      KUBE_SERVER:
        from_secret: KUBE_SERVER
    commands:
      - |
        set -euo pipefail

        # ── Build scoped kubeconfig from ServiceAccount token ──────────────────
        # Set KUBECONFIG first so kubectl config set-* writes to our file, not ~/.kube/config.
        # --embed-certs=true bakes the CA into the file so path references aren't needed.
        mkdir -p /tmp/kube
        export KUBECONFIG=/tmp/kube/config
        echo "$KUBE_DEPLOY_CA" | base64 -d > /tmp/kube/ca.crt
        kubectl config set-cluster atlas \
          --server="$KUBE_SERVER" \
          --certificate-authority=/tmp/kube/ca.crt \
          --embed-certs=true
        kubectl config set-credentials woodpecker-deployer \
          --token="$KUBE_DEPLOY_TOKEN"
        kubectl config set-context atlas \
          --cluster=atlas \
          --user=woodpecker-deployer \
          --namespace=atlas-uat
        kubectl config use-context atlas

        # ── Strict branch → namespace gate ────────────────────────────────────
        # Only explicitly listed branches may deploy. Anything else fails loudly.
        case "$CI_COMMIT_BRANCH" in
          uat)          NAMESPACE="atlas-uat" ;;
          dev)          NAMESPACE="atlas-dev" ;;
          main|master)
            echo "ERROR: Production deployment is not yet enabled."
            echo "To enable: add main/master to the global 'when: branch:' trigger"
            echo "and create the atlas-prod namespace + overlay first."
            exit 1
            ;;
          *)
            echo "ERROR: Branch '$CI_COMMIT_BRANCH' is not authorised to deploy."
            exit 1
            ;;
        esac
        echo "Branch: $CI_COMMIT_BRANCH → Namespace: $NAMESPACE"

        # Verify connectivity against the target namespace
        kubectl get namespace "$NAMESPACE"
        echo "✓ Connected to K8s API — target: $NAMESPACE"
        echo "Push branch: $CI_COMMIT_BRANCH | commit: $CI_COMMIT_SHA"

        # Short SHA used for image tagging (matches publish steps above)
        SHORT_SHA="${CI_COMMIT_SHA:0:8}"
        echo "Deploying images tagged :$SHORT_SHA"

        case "$CI_COMMIT_BRANCH" in
          uat)
            echo "Deploying to UAT (atlas-uat)..."

            for secret_name in ATLAS_INIT_TOKEN DB_USER DB_PASSWORD ADMIN_PASSWORD SMTP_TOKEN SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_FROM; do
              secret_value=$(printenv "$secret_name" || echo "")
              if [ -z "$secret_value" ]; then
                echo "FATAL ERROR: CI Secret '$secret_name' missing! UAT deployment aborted."
                exit 1
              fi
            done

            sed -i "s|REPLACE_WITH_CI_TOKEN|$ATLAS_INIT_TOKEN|g" k8s/overlays/uat/backend-patch.yaml
            sed -i "s|REPLACE_WITH_DB_USER|$DB_USER|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_DB_PASSWORD|$DB_PASSWORD|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_TOKEN|$SMTP_TOKEN|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_SERVER|$SMTP_SERVER|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_PORT|$SMTP_PORT|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_USERNAME|$SMTP_USERNAME|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_FROM|$SMTP_FROM|g" k8s/overlays/uat/config.yaml
            kubectl apply -k k8s/overlays/uat
            ;;

          dev)
            echo "Deploying to DEV (atlas-dev / dev.buildwithruud.com)..."
            # atlas_dev DB is pre-provisioned by NixForge — no psql needed here.

            for secret_name in ATLAS_INIT_TOKEN DB_USER DB_PASSWORD ADMIN_PASSWORD SMTP_TOKEN SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_FROM; do
              secret_value=$(printenv "$secret_name" || echo "")
              if [ -z "$secret_value" ]; then
                echo "FATAL ERROR: CI Secret '$secret_name' missing! Dev deployment aborted."
                exit 1
              fi
            done

            sed -i "s|REPLACE_WITH_CI_TOKEN|$ATLAS_INIT_TOKEN|g" k8s/overlays/dev/backend-patch.yaml
            sed -i "s|REPLACE_WITH_DB_USER|$DB_USER|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_DB_PASSWORD|$DB_PASSWORD|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_TOKEN|$SMTP_TOKEN|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_SERVER|$SMTP_SERVER|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_PORT|$SMTP_PORT|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_USERNAME|$SMTP_USERNAME|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_FROM|$SMTP_FROM|g" k8s/overlays/dev/config.yaml
            kubectl apply -k k8s/overlays/dev
            ;;

          # Unreachable due to gate above — kept as belt-and-suspenders
          *)
            echo "ERROR: Branch '$CI_COMMIT_BRANCH' is not authorised to deploy."
            exit 1
            ;;
        esac

        # ── Scoped rollout: use Woodpecker's native CI_COMMIT_CHANGED_FILES ────
        # Comma-separated → newline-separated for grep compatibility.
        CHANGED=$(echo "${CI_COMMIT_CHANGED_FILES:-}" | tr ',' '\n')
        echo "Changed paths:"
        echo "$CHANGED"

        # Helper: wait for rollout, tail logs on failure
        rollout_service() {
          local DEPLOY=$1
          echo "==> Verifying rollout: $DEPLOY"
          kubectl rollout status deployment/$DEPLOY -n $NAMESPACE --timeout=180s || {
            echo "===== LOGS: $DEPLOY ====="
            kubectl logs -n $NAMESPACE -l app=$DEPLOY --tail=100 --all-containers=true
            exit 1
          }
          echo "==> $DEPLOY is live on $SHORT_SHA ✓"
        }

        REGISTRY="ghcr.io/ruuderie"

        # Helper: set image then wait for rollout
        update_service() {
          local DEPLOY=$1
          local IMAGE=$2
          echo "==> Updating $DEPLOY to $IMAGE"
          kubectl set image deployment/$DEPLOY ${DEPLOY/-app/}-app=$IMAGE -n $NAMESPACE 2>/dev/null \
            || kubectl set image deployment/$DEPLOY $DEPLOY=$IMAGE -n $NAMESPACE 2>/dev/null \
            || kubectl set image deployment/$DEPLOY $(kubectl get deployment/$DEPLOY -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].name}')=$IMAGE -n $NAMESPACE
          kubectl rollout status deployment/$DEPLOY -n $NAMESPACE --timeout=180s || {
            echo "===== LOGS: $DEPLOY ====="
            kubectl logs -n $NAMESPACE -l app=$DEPLOY --tail=100 --all-containers=true
            exit 1
          }
          echo "==> $DEPLOY is live on $SHORT_SHA ✓"
        }

        # ── Scoped image rollout ────────────────────────────────────────────────
        # CI_COMMIT_CHANGED_FILES drives which services get a new image.
        # If it's empty (e.g. config-only commit, merge commit, first push to branch)
        # we do NOT blindly update all services — the images for this SHA may not
        # exist in GHCR (publish steps are path-gated and were skipped).
        # The kubectl apply -k above already updated all config/secrets.
        if [ -z "$CHANGED" ]; then
          echo "ℹ CI_COMMIT_CHANGED_FILES is empty — config/secrets applied, image rollouts skipped."
          echo "  Reason: no source files changed in this commit, so no images were built."
          echo "  To force a full image update: re-trigger the pipeline from the Woodpecker UI"
          echo "  on a commit that touches backend/ or apps/."
        else
          # Detect pipeline-config-only change → no new images built, skip image updates
          if echo "$CHANGED" | grep -qE "(\.woodpecker\.yml|k8s/)" && ! echo "$CHANGED" | grep -qE "^(backend/|apps/)"; then
            echo "Config/infra-only change — config and secrets applied, no image updates needed."
          else
            # Service-scoped image updates — only for services rebuilt in this run
            if echo "$CHANGED" | grep -qE "^backend/"; then
              update_service backend "$REGISTRY/atlas-backend:$SHORT_SHA"
            fi
            if echo "$CHANGED" | grep -qE "^apps/platform-admin/"; then
              update_service platform-admin "$REGISTRY/platform-admin:$SHORT_SHA"
            fi
            if echo "$CHANGED" | grep -qE "^apps/network-instance/"; then
              update_service network-instance "$REGISTRY/network-instance:$SHORT_SHA"
            fi
            if echo "$CHANGED" | grep -qE "^apps/anchor/"; then
              update_service anchor-app "$REGISTRY/anchor-app:$SHORT_SHA"
            fi
          fi
        fi

        echo "Deployment complete. Commit $SHORT_SHA is live."


  # ── Notifications ───────────────────────────────────────────────────────────
  notify_discord:
    image: appleboy/drone-discord
    failure: ignore
    settings:
      webhook_id: ${DISCORD_WEBHOOK_ID:-ignored}
      webhook_token: ${DISCORD_WEBHOOK_TOKEN:-ignored}
      message: >
        **Atlas Platform Deployment**
        {{#success build.status}}
          ✅ Pipeline #{{build.number}} successfully compiled and deployed all unified monorepo applications!
        {{else}}
          ❌ Pipeline #{{build.number}} failed during phase `{{build.failed_steps}}`.
        {{/success}}
        *Pipeline Logs:* {{build.link}}
    when:
      - status: [success, failure]
        event: [push]

  notify_email:
    image: drillster/drone-email
    failure: ignore
    settings:
      host:
        from_secret: SMTP_SERVER
      port:
        from_secret: SMTP_PORT
      username:
        from_secret: SMTP_USERNAME
      password:
        from_secret: SMTP_TOKEN
      from:
        from_secret: SMTP_FROM
      recipients:
        from_secret: NOTIFICATION_EMAIL
      recipients_only: true
      subject: "[Atlas CI] Pipeline #{{build.number}} results: {{build.status}}"
      body: |
        Atlas Platform Deployment Status
        ------------------------------------
        Status: {{build.status}}
        Project: {{repo.owner}}/{{repo.name}}
        Branch: {{build.branch}}
        Commit: {{build.commit}} - {{commit.message}}
        Requested By: {{build.author}}

        Failed Steps: {{build.failed_steps}}

        Logs Available At: {{build.link}}
    when:
      - status: [success, failure]
        event: [push]

  # ── Workspace Cleanup ───────────────────────────────────────────────────────
  cleanup_workspace:
    image: alpine
    commands:
      - rm -rf target/ || true
    when:
      - status: [success, failure]
        event: [push]

# Trigger full pipeline run
# Trigger full platform build
