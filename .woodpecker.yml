when:
  - event: [push]

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oplydbtest

steps:
  test_workspace:
    image: rust:slim
    environment:
      TEST_DATABASE_URL: postgres://postgres:postgres@database:5432/oplydbtest
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev postgresql-client
      - |
        echo "Waiting for database to initialize..."
        until pg_isready -h database -p 5432 -U postgres; do
          sleep 2
        done
      - cd backend && cargo test --workspace -- --test-threads=1

  # Build apps in parallel
  build_platform_admin:
    image: rust:slim
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev
      - cd apps/platform-admin && cargo build --release
    depends_on: [test_workspace]

  build_directory_instance:
    image: rust:slim
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev
      - cd apps/directory-instance && cargo build --release
    depends_on: [test_workspace]

  build_anchor:
    image: rust:slim
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev
      - cd apps/anchor && cargo build --release
    depends_on: [test_workspace]

  # Parallel Docker Build & Push
  publish_platform_admin:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      repo: ghcr.io/ruuderie/platform-admin
      tags: latest
      registry: ghcr.io
      context: .
      dockerfile: apps/platform-admin/Dockerfile
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [build_platform_admin]

  publish_directory_instance:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      repo: ghcr.io/ruuderie/directory-instance
      tags: latest
      registry: ghcr.io
      context: .
      dockerfile: apps/directory-instance/Dockerfile
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [build_directory_instance]

  publish_anchor:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      repo: ghcr.io/ruuderie/anchor-app
      tags: latest
      registry: ghcr.io
      context: .
      dockerfile: apps/anchor/Dockerfile
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [build_anchor]

  # Unified CD Deployment Step
  deploy_platform_k8s:
    image: bitnami/kubectl:latest
    volumes:
      - /etc/rancher/k3s/k3s.yaml:/kubeconfig.yaml:ro
    environment:
      KUBECONFIG: /kubeconfig.yaml
    commands:
      # We restart the deployments inside the shared Atlas namespace
      - kubectl patch deployment platform-admin -n atlas-platform -p '{"spec":{"template":{"metadata":{"annotations":{"prometheus.io/scrape":"true","prometheus.io/port":"3000"}}}}}'
      - kubectl patch deployment directory-instance -n atlas-platform -p '{"spec":{"template":{"metadata":{"annotations":{"prometheus.io/scrape":"true","prometheus.io/port":"3000"}}}}}'
      - kubectl patch deployment anchor-app -n atlas-platform -p '{"spec":{"template":{"metadata":{"annotations":{"prometheus.io/scrape":"true","prometheus.io/port":"3000"}}}}}'
      - kubectl rollout restart deployment/platform-admin -n atlas-platform
      - kubectl rollout restart deployment/directory-instance -n atlas-platform
      - kubectl rollout restart deployment/anchor-app -n atlas-platform
    depends_on: [publish_platform_admin, publish_directory_instance, publish_anchor]

  # Core Notification
  notify_discord:
    image: appleboy/drone-discord
    failure: ignore
    settings:
      webhook_id: ${DISCORD_WEBHOOK_ID:-ignored}
      webhook_token: ${DISCORD_WEBHOOK_TOKEN:-ignored}
      message: >
        **Atlas Platform Deployment**
        {{#success build.status}}
          ✅ Pipeline #{{build.number}} successfully compiled and deployed all unified monorepo applications!
        {{else}}
          ❌ Pipeline #{{build.number}} failed during phase `{{build.failed_steps}}`.
        {{/success}}
        *Pipeline Logs:* {{build.link}}
    when:
      - status: [success, failure]
        event: [push]
    depends_on: [deploy_platform_k8s]
