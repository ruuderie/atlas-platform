when:
  - event: [push]

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oplydbtest

steps:
  test_workspace:
    image: rust:slim
    environment:
      TEST_DATABASE_URL: postgres://postgres:postgres@database:5432/oplydbtest
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev postgresql-client
      - |
        echo "Waiting for database to initialize..."
        until pg_isready -h database -p 5432 -U postgres; do
          sleep 2
        done
      - cd backend && cargo test --workspace -- --test-threads=1

  # Sequential Docker Build & Push


  publish_platform_admin:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/platform-admin
      tags: latest
      registry: ghcr.io
      context: .
      dockerfile: apps/platform-admin/Dockerfile
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      path:
        - 'apps/platform-admin/**'
        - '.woodpecker.yml'

  publish_backend:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/atlas-backend
      tags: latest
      registry: ghcr.io
      context: backend
      dockerfile: backend/Dockerfile
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      path:
        - 'backend/**'
        - '.woodpecker.yml'

  publish_network_instance:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/network-instance
      tags: latest
      registry: ghcr.io
      context: .
      dockerfile: apps/network-instance/Dockerfile
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      path:
        - 'apps/network-instance/**'
        - '.woodpecker.yml'

  publish_anchor:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/anchor-app
      tags: latest
      registry: ghcr.io
      context: .
      dockerfile: apps/anchor/Dockerfile
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      path:
        - 'apps/anchor/**'
        - '.woodpecker.yml'

  # Unified CD Deployment Step
  deploy_platform_k8s:
    image: bitnami/kubectl:latest
    volumes:
      - /etc/rancher/k3s/k3s.yaml:/kubeconfig.yaml:ro
    environment:
      ATLAS_INIT_TOKEN:
        from_secret: ATLAS_INIT_TOKEN
      DB_USER:
        from_secret: db_user
      DB_PASSWORD:
        from_secret: db_password
      ADMIN_PASSWORD:
        from_secret: admin_password
      SMTP_TOKEN:
        from_secret: SMTP_TOKEN
      SMTP_SERVER:
        from_secret: SMTP_SERVER
      SMTP_PORT:
        from_secret: SMTP_PORT
      SMTP_USERNAME:
        from_secret: SMTP_USERNAME
      SMTP_FROM:
        from_secret: SMTP_FROM
    commands:
      - set -euo pipefail
      - export KUBECONFIG=/tmp/kubeconfig.yaml
      - cp /kubeconfig.yaml /tmp/kubeconfig.yaml
      - sed -i 's/127.0.0.1/host.docker.internal/g' /tmp/kubeconfig.yaml
      - kubectl cluster-info
      - echo "Push branch is $CI_COMMIT_BRANCH"
      - |
        if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "master" ]; then
          echo "Deploying to PROD environment..."
          kubectl apply -k k8s/overlays/prod || echo "[Warn] Prod overlay not yet scaffolded"
        else
          echo "Injecting UAT Environment Secrets dynamically via Woodpecker..."
          
          # Strictly validate existence of required secrets so CI fails loudly instead of deploying a broken state
          for secret_name in ATLAS_INIT_TOKEN DB_USER DB_PASSWORD ADMIN_PASSWORD SMTP_TOKEN SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_FROM; do
            secret_value=$(printenv "$secret_name" || echo "")
            if [ -z "$secret_value" ]; then
              echo "FATAL ERROR: CI Secret '$secret_name' is empty or missing! Deployment aborted to prevent cluster misconfiguration."
              exit 1
            fi
          done

          sed -i "s|REPLACE_WITH_CI_TOKEN|$ATLAS_INIT_TOKEN|g" k8s/overlays/uat/backend-patch.yaml
          sed -i "s|REPLACE_WITH_DB_USER|$DB_USER|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_DB_PASSWORD|$DB_PASSWORD|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_TOKEN|$SMTP_TOKEN|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_SERVER|$SMTP_SERVER|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_PORT|$SMTP_PORT|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_USERNAME|$SMTP_USERNAME|g" k8s/overlays/uat/config.yaml
          sed -i "s|REPLACE_WITH_SMTP_FROM|$SMTP_FROM|g" k8s/overlays/uat/config.yaml
          
          echo "Deploying to UAT environment..."
          kubectl apply -k k8s/overlays/uat
        fi
        
        # Ensure pods are force-restarted to pull the latest image layer regardless of tag changes
        kubectl rollout restart deployment/platform-admin -n atlas-platform
        kubectl rollout restart deployment/network-instance -n atlas-platform
        kubectl rollout restart deployment/anchor-app -n atlas-platform
        kubectl rollout restart deployment/backend -n atlas-platform
        
        # Block pipeline success until all new replica sets are verified as healthy and running
        echo "Verifying backend rollout..."
        kubectl rollout status deployment/backend -n atlas-platform --timeout=180s || exit 1
        echo "Verifying platform-admin rollout..."
        kubectl rollout status deployment/platform-admin -n atlas-platform --timeout=180s || exit 1
        echo "Verifying network-instance rollout..."
        kubectl rollout status deployment/network-instance -n atlas-platform --timeout=180s || exit 1
        echo "Verifying anchor-app rollout..."
        kubectl rollout status deployment/anchor-app -n atlas-platform --timeout=180s || exit 1
        
        # Allow purge of old admin dynamically via script or direct DB logic if ever manually needed.
        # Cleaned up application-level API vulnerabilities.

  # Core Notification
  notify_discord:
    image: appleboy/drone-discord
    failure: ignore
    settings:
      webhook_id: ${DISCORD_WEBHOOK_ID:-ignored}
      webhook_token: ${DISCORD_WEBHOOK_TOKEN:-ignored}
      message: >
        **Atlas Platform Deployment**
        Pipeline #${CI_PIPELINE_NUMBER} finished with status: ${CI_PIPELINE_STATUS}.
        *Pipeline Logs:* ${CI_PIPELINE_URL}
    when:
      - status: [success, failure]
        event: [push]

  # Global Email Notification
  notify_email:
    image: drillster/drone-email
    failure: ignore
    settings:
      host:
        from_secret: SMTP_SERVER
      port:
        from_secret: SMTP_PORT
      username:
        from_secret: SMTP_USERNAME
      password:
        from_secret: SMTP_TOKEN
      from:
        from_secret: SMTP_FROM
      recipients:
        from_secret: NOTIFICATION_EMAIL
      recipients_only: true
      subject: "[Atlas CI] Pipeline #${CI_PIPELINE_NUMBER} results: ${CI_PIPELINE_STATUS}"
      body: |
        Atlas Platform Deployment Status
        ------------------------------------
        Status: ${CI_PIPELINE_STATUS}
        Requested By: ${CI_COMMIT_AUTHOR}
        Branch: ${CI_COMMIT_BRANCH}
        Commit: ${CI_COMMIT_SHA}
        
        Logs Available At: ${CI_PIPELINE_URL}
    when:
      - status: [success, failure]
        event: [push]

  # Workspace Cleanup
  cleanup_workspace:
    image: alpine
    commands:
      - rm -rf target/ || true
    when:
      - status: [success, failure]
        event: [push]
