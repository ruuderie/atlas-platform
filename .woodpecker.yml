# CI refresh: 2026-06-21
# ── Manual full-rebuild override ─────────────────────────────────────────────
# To force ALL app Docker builds regardless of which files changed:
#   1. Go to Woodpecker UI → this repo → Pipelines → "Run Pipeline"
#   2. Select branch (dev or uat)
#   3. Under Variables, add:  FORCE_BUILD_ALL = true
#   4. Click Run
# On normal push: FORCE_BUILD_ALL is unset (treated as false) and path filters apply.
# ─────────────────────────────────────────────────────────────────────────────
when:
  - event: [push]
    branch:
      - uat
      - dev
  - event: [manual]
    branch:
      - uat
      - dev

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oplydbtest

steps:
  # ═══════════════════════════════════════════════════════════════════════════
  # HIGH-PERFORMANCE RUST CI (Staff Engineer Optimized)
  # ═══════════════════════════════════════════════════════════════════════════
  # Benefits (Layman Terms):
  #   - Caching: Keeps built code between runs → 3-6x faster after first run
  #   - mold linker: Faster final assembly step (20-40% quicker linking)
  #   - Parallel builds: Uses all CPU cores instead of just 1
  #   - CARGO_INCREMENTAL: Only rebuilds what changed
  # Expected improvement: From ~10-15 min → 3-6 min on subsequent runs
  # ═══════════════════════════════════════════════════════════════════════════
  test_workspace:
    image: rust:1.91-slim   # Upgraded to support aws-smithy-* and time crates (require 1.88+)
    environment:
      TEST_DATABASE_URL: postgres://postgres:postgres@database:5432/oplydbtest
      CARGO_INCREMENTAL: "1"
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev postgresql-client mold
      - |
        echo "Waiting for database to initialize..."
        until pg_isready -h database -p 5432 -U postgres; do
          sleep 2
        done

      # Restore cache from previous run (biggest performance win)
      - |
        mkdir -p /cache/cargo /cache/target
        if [ -d /cache/cargo ]; then
          cp -r /cache/cargo $CARGO_HOME 2>/dev/null || true
        fi
        if [ -d /cache/target ]; then
          cp -r /cache/target ./target 2>/dev/null || true
        fi

      # Full parallel build + test
      - cd backend && cargo test --workspace -j $(nproc) -- --test-threads=$(nproc)

      # Save cache for next pipeline run
      - |
        cp -r $CARGO_HOME /cache/cargo 2>/dev/null || true
        cp -r ./target /cache/target 2>/dev/null || true

  # ── Bundle Version Sync Lint ───────────────────────────────────────────────
  # Prevents the stylesheet-404 bug: when output-name is bumped in Cargo.toml
  # (e.g. anchor-v4 → anchor-v5), the matching <Stylesheet href="/pkg/NAME.css"/>
  # in app.rs MUST be updated too. If they diverge, the browser requests a CSS
  # file that doesn't exist, the CDN returns index.html, and the page loads
  # completely unstyled. This check catches that mismatch before it ships.
  lint_bundle_version_sync:
    image: alpine
    commands:
      - apk add --no-cache grep
      - |
        set -euo pipefail
        FAIL=0

        check_sync() {
          local APP=$1
          local CARGO=$2
          local APPRS=$3

          # Extract the output-name value from Cargo.toml
          NAME=$(grep '^output-name' "$CARGO" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ -z "$NAME" ]; then
            echo "⚠  $APP: could not extract output-name from $CARGO (skipping)"
            return
          fi

          EXPECTED="/pkg/$${NAME}.css"

          if grep -qF "$EXPECTED" "$APPRS"; then
            echo "✓  $APP: output-name '$NAME' matches Stylesheet href ($EXPECTED)"
          else
            ACTUAL=$(grep -o '/pkg/[^"]*\.css' "$APPRS" | head -1 || echo "<not found>")
            echo "✗  $APP: MISMATCH"
            echo "     Cargo.toml output-name  : $NAME  →  expected href: $EXPECTED"
            echo "     app.rs Stylesheet href   : $ACTUAL"
            echo "   Fix: update the <Stylesheet href=...> in $APPRS to match $EXPECTED"
            FAIL=1
          fi
        }

        check_sync "anchor" \
          "apps/anchor/Cargo.toml" \
          "apps/anchor/src/app.rs"

        check_sync "network-instance" \
          "apps/network-instance/Cargo.toml" \
          "apps/network-instance/src/app.rs"

        if [ "$FAIL" -ne 0 ]; then
          echo ""
          echo "LINT FAILED: bundle version is out of sync."
          echo "See above for which file to fix."
          exit 1
        fi
    when:
      - evaluate: 'CI_PIPELINE_EVENT == "manual" && FORCE_BUILD_ALL == "true"'
        branch: [dev, uat]
      - branch: [dev, uat]
        path:
          - 'apps/anchor/Cargo.toml'
          - 'apps/anchor/src/app.rs'
          - 'apps/network-instance/Cargo.toml'
          - 'apps/network-instance/src/app.rs'
          - '.woodpecker.yml'

  # ── Apps Compile Gate ──────────────────────────────────────────────────────
  # This runs BEFORE Docker builds and catches Rust compile errors in the
  # apps workspace early. Without this, errors are only discovered inside
  # the Docker build step — slow, noisy, and after the fact.
  # WASM compilation (wasm32-unknown-unknown) is done inside the Dockerfile;
  # here we only check native SSR compilation which covers 99% of errors.
  check_apps_compile:
    image: rust:1.91-slim
    environment:
      CARGO_INCREMENTAL: "1"
      CARGO_TERM_COLOR: always
    commands:
      - apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev mold
      - |
        mkdir -p /cache/cargo
        if [ -d /cache/cargo ]; then
          cp -r /cache/cargo $CARGO_HOME 2>/dev/null || true
        fi
      # Check anchor (SSR feature covers all shared logic and view! macros)
      - cd apps && cargo check -p anchor --features ssr -j $(nproc)
      # Check network-instance
      - cd apps && cargo check -p atlas_network_instance --features ssr -j $(nproc)
      # Check platform-admin (CSR only, no SSR feature)
      - cd apps && cargo check -p atlas_platform_admin -j $(nproc)
      # Check folio (SSR feature)
      - cd apps && cargo check -p folio --features ssr -j $(nproc)
      # Check shared-ui to catch any import/API surface regressions
      - cd apps && cargo check -p shared-ui --features ssr -j $(nproc)
      - |
        cp -r $CARGO_HOME /cache/cargo 2>/dev/null || true
    when:
      - evaluate: 'CI_PIPELINE_EVENT == "manual" && FORCE_BUILD_ALL == "true"'
        branch: [dev, uat]
      - branch: [dev, uat]
        path:
          - 'apps/**'
          - '.woodpecker.yml'


