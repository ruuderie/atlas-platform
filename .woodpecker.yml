# CI refresh: 2026-05-14
when:
  - event: [push]
    branch:
      - uat
      - dev

services:
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oplydbtest

steps:
  # ═══════════════════════════════════════════════════════════════════════════
  # HIGH-PERFORMANCE RUST CI (Staff Engineer Optimized)
  # ═══════════════════════════════════════════════════════════════════════════
  # Benefits (Layman Terms):
  #   - Caching: Keeps built code between runs → 3-6x faster after first run
  #   - mold linker: Faster final assembly step (20-40% quicker linking)
  #   - Parallel builds: Uses all CPU cores instead of just 1
  #   - CARGO_INCREMENTAL: Only rebuilds what changed
  # Expected improvement: From ~10-15 min → 3-6 min on subsequent runs
  # ═══════════════════════════════════════════════════════════════════════════
  test_workspace:
    image: rust:1.91-slim   # Upgraded to support aws-smithy-* and time crates (require 1.88+)
    environment:
      TEST_DATABASE_URL: postgres://postgres:postgres@database:5432/oplydbtest
      CARGO_INCREMENTAL: "1"
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    commands:
      - apt-get update && apt-get install -y pkg-config libssl-dev postgresql-client mold
      - |
        echo "Waiting for database to initialize..."
        until pg_isready -h database -p 5432 -U postgres; do
          sleep 2
        done

      # Restore cache from previous run (biggest performance win)
      - |
        mkdir -p /cache/cargo /cache/target
        if [ -d /cache/cargo ]; then
          cp -r /cache/cargo $CARGO_HOME 2>/dev/null || true
        fi
        if [ -d /cache/target ]; then
          cp -r /cache/target ./target 2>/dev/null || true
        fi

      # Full parallel build + test
      - cd backend && cargo test --workspace -j $(nproc) -- --test-threads=$(nproc)

      # Save cache for next pipeline run
      - |
        cp -r $CARGO_HOME /cache/cargo 2>/dev/null || true
        cp -r ./target /cache/target 2>/dev/null || true

  # ── Bundle Version Sync Lint ───────────────────────────────────────────────
  # Prevents the stylesheet-404 bug: when output-name is bumped in Cargo.toml
  # (e.g. anchor-v4 → anchor-v5), the matching <Stylesheet href="/pkg/NAME.css"/>
  # in app.rs MUST be updated too. If they diverge, the browser requests a CSS
  # file that doesn't exist, the CDN returns index.html, and the page loads
  # completely unstyled. This check catches that mismatch before it ships.
  lint_bundle_version_sync:
    image: alpine
    commands:
      - apk add --no-cache grep
      - |
        set -euo pipefail
        FAIL=0

        check_sync() {
          local APP=$1
          local CARGO=$2
          local APPRS=$3

          # Extract the output-name value from Cargo.toml
          NAME=$(grep '^output-name' "$CARGO" | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          if [ -z "$NAME" ]; then
            echo "⚠  $APP: could not extract output-name from $CARGO (skipping)"
            return
          fi

          EXPECTED="/pkg/${NAME}.css"

          if grep -qF "$EXPECTED" "$APPRS"; then
            echo "✓  $APP: output-name '$NAME' matches Stylesheet href ($EXPECTED)"
          else
            ACTUAL=$(grep -o '/pkg/[^"]*\.css' "$APPRS" | head -1 || echo "<not found>")
            echo "✗  $APP: MISMATCH"
            echo "     Cargo.toml output-name  : $NAME  →  expected href: $EXPECTED"
            echo "     app.rs Stylesheet href   : $ACTUAL"
            echo "   Fix: update the <Stylesheet href=...> in $APPRS to match $EXPECTED"
            FAIL=1
          fi
        }

        check_sync "anchor" \
          "apps/anchor/Cargo.toml" \
          "apps/anchor/src/app.rs"

        check_sync "network-instance" \
          "apps/network-instance/Cargo.toml" \
          "apps/network-instance/src/app.rs"

        if [ "$FAIL" -ne 0 ]; then
          echo ""
          echo "LINT FAILED: bundle version is out of sync."
          echo "See above for which file to fix."
          exit 1
        fi
    when:
      branch: [dev, uat]
      path:
        - 'apps/anchor/Cargo.toml'
        - 'apps/anchor/src/app.rs'
        - 'apps/network-instance/Cargo.toml'
        - 'apps/network-instance/src/app.rs'
        - '.woodpecker.yml'

  # ── Apps Compile Gate ──────────────────────────────────────────────────────
  # This runs BEFORE Docker builds and catches Rust compile errors in the
  # apps workspace early. Without this, errors are only discovered inside
  # the Docker build step — slow, noisy, and after the fact.
  # WASM compilation (wasm32-unknown-unknown) is done inside the Dockerfile;
  # here we only check native SSR compilation which covers 99% of errors.
  check_apps_compile:
    image: rust:1.91-slim
    environment:
      CARGO_INCREMENTAL: "1"
      CARGO_TERM_COLOR: always
    commands:
      - apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev mold
      - |
        mkdir -p /cache/cargo
        if [ -d /cache/cargo ]; then
          cp -r /cache/cargo $CARGO_HOME 2>/dev/null || true
        fi
      # Check anchor (SSR feature covers all shared logic and view! macros)
      - cd apps && cargo check -p anchor --features ssr -j $(nproc)
      # Check network-instance
      - cd apps && cargo check -p atlas_network_instance --features ssr -j $(nproc)
      # Check platform-admin (CSR only, no SSR feature)
      - cd apps && cargo check -p atlas_platform_admin -j $(nproc)
      # Check shared-ui to catch any import/API surface regressions
      - cd apps && cargo check -p shared-ui --features ssr -j $(nproc)
      - |
        cp -r $CARGO_HOME /cache/cargo 2>/dev/null || true
    when:
      branch: [dev, uat]
      path:
        - 'apps/**'
        - '.woodpecker.yml'


  publish_platform_admin_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/platform-admin
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/platform-admin/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'apps/platform-admin/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_platform_admin_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/platform-admin
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/platform-admin/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'apps/platform-admin/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_backend_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/atlas-backend
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: backend
      dockerfile: backend/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'backend/**'
        - '.woodpecker.yml'

  publish_backend_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/atlas-backend
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: backend
      dockerfile: backend/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'backend/**'
        - '.woodpecker.yml'

  publish_network_instance_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/network-instance
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/network-instance/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'apps/network-instance/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_network_instance_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/network-instance
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/network-instance/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'apps/network-instance/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_anchor_dev:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/anchor-app
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/anchor/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: debug
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: dev
      path:
        - 'apps/anchor/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  publish_anchor_uat:
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    settings:
      mirror: https://mirror.gcr.io
      repo: ghcr.io/ruuderie/anchor-app
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      registry: ghcr.io
      context: .
      dockerfile: apps/anchor/Dockerfile
      build_args:
        ATLAS_BUILD_SHA: ${CI_COMMIT_SHA}
        ATLAS_BUILD_DATE: ${CI_PIPELINE_CREATED}
        BUILD_PROFILE: release
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    when:
      branch: uat
      path:
        - 'apps/anchor/**'
        - 'apps/shared-ui/**'
        - '.woodpecker.yml'

  # ── Deployment Markers ──────────────────────────────────────────────────────
  # We use these markers because Woodpecker's CI_PIPELINE_FILES variable is often
  # empty on large pushes, causing the deployment script to silently skip updates.
  # These steps natively use Woodpecker's robust path filtering to set flags.
  
  mark_backend_built:
    image: alpine
    commands: [ "touch .backend_built" ]
    when:
      branch: [dev, uat]
      path: [ "backend/**", ".woodpecker.yml" ]

  mark_anchor_built:
    image: alpine
    commands: [ "touch .anchor_built" ]
    when:
      branch: [dev, uat]
      path: [ "apps/anchor/**", "apps/shared-ui/**", ".woodpecker.yml" ]

  mark_network_built:
    image: alpine
    commands: [ "touch .network_built" ]
    when:
      branch: [dev, uat]
      path: [ "apps/network-instance/**", "apps/shared-ui/**", ".woodpecker.yml" ]

  mark_admin_built:
    image: alpine
    commands: [ "touch .admin_built" ]
    when:
      branch: [dev, uat]
      path: [ "apps/platform-admin/**", "apps/shared-ui/**", ".woodpecker.yml" ]

  # ── Unified CD Deployment ───────────────────────────────────────────────────
  deploy_platform_k8s:
    image: bitnami/kubectl:latest
    environment:
      ATLAS_INIT_TOKEN:
        from_secret: ATLAS_INIT_TOKEN
      DB_USER:
        from_secret: db_user
      DB_PASSWORD:
        from_secret: db_password
      ADMIN_PASSWORD:
        from_secret: admin_password
      SMTP_TOKEN:
        from_secret: SMTP_TOKEN
      SMTP_SERVER:
        from_secret: SMTP_SERVER
      SMTP_PORT:
        from_secret: SMTP_PORT
      SMTP_USERNAME:
        from_secret: SMTP_USERNAME
      SMTP_FROM:
        from_secret: SMTP_FROM
      METRICS_TOKEN:
        from_secret: METRICS_TOKEN
      JWT_SECRET:
        from_secret: JWT_SECRET
      KUBE_DEPLOY_TOKEN:
        from_secret: KUBE_DEPLOY_TOKEN
      KUBE_DEPLOY_CA:
        from_secret: KUBE_DEPLOY_CA
      KUBE_SERVER:
        from_secret: KUBE_SERVER
    commands:
      - |
        set -euo pipefail

        mkdir -p /tmp/kube
        export KUBECONFIG=/tmp/kube/config
        echo "$KUBE_DEPLOY_CA" | base64 -d > /tmp/kube/ca.crt
        kubectl config set-cluster atlas \
          --server="$KUBE_SERVER" \
          --certificate-authority=/tmp/kube/ca.crt \
          --embed-certs=true
        kubectl config set-credentials woodpecker-deployer \
          --token="$KUBE_DEPLOY_TOKEN"
        kubectl config set-context atlas \
          --cluster=atlas \
          --user=woodpecker-deployer \
          --namespace=atlas-uat
        kubectl config use-context atlas

        case "$CI_COMMIT_BRANCH" in
          uat)          NAMESPACE="atlas-uat" ;;
          dev)          NAMESPACE="atlas-dev" ;;
          main|master)
            echo "ERROR: Production deployment is not yet enabled."
            echo "To enable: add main/master to the global 'when: branch:' trigger"
            echo "and create the atlas-prod namespace + overlay first."
            exit 1
            ;;
          *)
            echo "ERROR: Branch '$CI_COMMIT_BRANCH' is not authorised to deploy."
            exit 1
            ;;
        esac

        kubectl get namespace "$NAMESPACE"
        echo "✓ Connected to K8s API — target: $NAMESPACE"
        echo "Push branch: $CI_COMMIT_BRANCH | commit: $CI_COMMIT_SHA"

        SHORT_SHA="${CI_COMMIT_SHA:0:8}"
        echo "Deploying images tagged :$SHORT_SHA"

        case "$CI_COMMIT_BRANCH" in
          uat)
            echo "Deploying to UAT (atlas-uat)..."

            for secret_name in ATLAS_INIT_TOKEN DB_USER DB_PASSWORD ADMIN_PASSWORD SMTP_TOKEN SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_FROM METRICS_TOKEN JWT_SECRET; do
              secret_value=$(printenv "$secret_name" || echo "")
              # Strip newlines and carriage returns that break sed
              secret_value=$(echo -n "$secret_value" | tr -d '\n\r')
              if [ -z "$secret_value" ]; then
                echo "FATAL ERROR: CI Secret '$secret_name' missing! UAT deployment aborted."
                exit 1
              fi
              export "$secret_name"="$secret_value"
            done

            sed -i "s|REPLACE_WITH_CI_TOKEN|$ATLAS_INIT_TOKEN|g" k8s/overlays/uat/backend-patch.yaml
            sed -i "s|REPLACE_WITH_DB_USER|$DB_USER|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_DB_PASSWORD|$DB_PASSWORD|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_TOKEN|$SMTP_TOKEN|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_SERVER|$SMTP_SERVER|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_PORT|$SMTP_PORT|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_USERNAME|$SMTP_USERNAME|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_FROM|$SMTP_FROM|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_METRICS_TOKEN|$METRICS_TOKEN|g" k8s/overlays/uat/config.yaml
            sed -i "s|REPLACE_WITH_JWT_SECRET|$JWT_SECRET|g" k8s/overlays/uat/config.yaml
            kubectl apply -k k8s/overlays/uat
            ;;

          dev)
            echo "Deploying to DEV (atlas-dev / dev.buildwithruud.com)..."

            for secret_name in ATLAS_INIT_TOKEN DB_USER DB_PASSWORD ADMIN_PASSWORD SMTP_TOKEN SMTP_SERVER SMTP_PORT SMTP_USERNAME SMTP_FROM METRICS_TOKEN JWT_SECRET; do
              secret_value=$(printenv "$secret_name" || echo "")
              # Strip newlines and carriage returns that break sed
              secret_value=$(echo -n "$secret_value" | tr -d '\n\r')
              if [ -z "$secret_value" ]; then
                echo "FATAL ERROR: CI Secret '$secret_name' missing! Dev deployment aborted."
                exit 1
              fi
              export "$secret_name"="$secret_value"
            done

            sed -i "s|REPLACE_WITH_CI_TOKEN|$ATLAS_INIT_TOKEN|g" k8s/overlays/dev/backend-patch.yaml
            sed -i "s|REPLACE_WITH_DB_USER|$DB_USER|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_DB_PASSWORD|$DB_PASSWORD|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_ADMIN_PASSWORD|$ADMIN_PASSWORD|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_TOKEN|$SMTP_TOKEN|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_SERVER|$SMTP_SERVER|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_PORT|$SMTP_PORT|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_USERNAME|$SMTP_USERNAME|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_SMTP_FROM|$SMTP_FROM|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_METRICS_TOKEN|$METRICS_TOKEN|g" k8s/overlays/dev/config.yaml
            sed -i "s|REPLACE_WITH_JWT_SECRET|$JWT_SECRET|g" k8s/overlays/dev/config.yaml
            kubectl apply -k k8s/overlays/dev
            ;;

          *)
            echo "ERROR: Branch '$CI_COMMIT_BRANCH' is not authorised to deploy."
            exit 1
            ;;
        esac

        CHANGED=$(echo "${CI_PIPELINE_FILES:-}" | tr -d '[]' | tr ',' '\n')
        echo "Changed paths:"
        echo "$CHANGED"

        rollout_service() {
          local DEPLOY=$1
          echo "==> Verifying rollout: $DEPLOY"
          kubectl rollout status deployment/$DEPLOY -n $NAMESPACE --timeout=180s || {
            echo "===== LOGS: $DEPLOY ====="
            kubectl logs -n $NAMESPACE -l app=$DEPLOY --tail=100 --all-containers=true
            exit 1
          }
          echo "==> $DEPLOY is live on $SHORT_SHA ✓"
        }

        REGISTRY="ghcr.io/ruuderie"

        update_service() {
          local DEPLOY=$1
          local IMAGE=$2
          echo "==> Updating $DEPLOY to $IMAGE"
          kubectl set image deployment/$DEPLOY ${DEPLOY/-app/}-app=$IMAGE -n $NAMESPACE 2>/dev/null \
            || kubectl set image deployment/$DEPLOY $DEPLOY=$IMAGE -n $NAMESPACE 2>/dev/null \
            || kubectl set image deployment/$DEPLOY $(kubectl get deployment/$DEPLOY -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[0].name}')=$IMAGE -n $NAMESPACE
          kubectl rollout status deployment/$DEPLOY -n $NAMESPACE --timeout=180s || {
            echo "===== LOGS: $DEPLOY ====="
            kubectl logs -n $NAMESPACE -l app=$DEPLOY --tail=100 --all-containers=true
            exit 1
          }
          echo "==> $DEPLOY is live on $SHORT_SHA ✓"
        }

        if [ ! -f .backend_built ] && [ ! -f .anchor_built ] && [ ! -f .network_built ] && [ ! -f .admin_built ]; then
          echo "ℹ No app build markers found — config and secrets applied, image rollouts skipped."
          echo "  (If you expected an image update, check the 'when: path' rules on the mark_*_built steps)"
        else
          if [ -f .backend_built ]; then
            update_service backend "$REGISTRY/atlas-backend:$SHORT_SHA"
          fi

          if [ -f .anchor_built ]; then
            update_service anchor-app "$REGISTRY/anchor-app:$SHORT_SHA"
          fi

          if [ -f .network_built ]; then
            update_service network-instance "$REGISTRY/network-instance:$SHORT_SHA"
          fi

          if [ -f .admin_built ]; then
            update_service platform-admin "$REGISTRY/platform-admin:$SHORT_SHA"
          fi
        fi

        echo "Deployment complete. Commit $SHORT_SHA is live."


  # ── Post-Deploy Smoke Test ──────────────────────────────────────────────────
  # Hits the /health endpoint on each environment after deploy and fails the
  # pipeline if the new pod is not serving a 200. This catches a new image
  # that crashes on startup before anyone notices via the browser.
  smoke_test_dev:
    image: curlimages/curl:latest
    commands:
      - |
        echo "Smoke testing dev.buildwithruud.com ..."
        sleep 15  # Give the rollout a moment to settle
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dev.buildwithruud.com/api/health --max-time 20 || echo "000")
        if [ "$STATUS" != "200" ]; then
          echo "SMOKE TEST FAILED — /api/health returned HTTP $STATUS (expected 200)"
          echo "The new pod may have crashed. Check: kubectl logs -n atlas-dev -l app=anchor-app --tail=50"
          exit 1
        fi
        echo "✓ Smoke test passed — dev is healthy (HTTP $STATUS)"
    failure: ignore
    when:
      branch: dev
      path:
        - 'apps/anchor/**'
        - 'apps/shared-ui/**'
        - 'backend/**'

  annotate_grafana_dev:
    image: curlimages/curl:latest
    environment:
      GRAFANA_URL: "https://grafana.oply.co"
      GRAFANA_TOKEN:
        from_secret: grafana_token
    commands:
      - |
        SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-8)
        curl -s -X POST $GRAFANA_URL/api/annotations \
          -H "Authorization: Bearer $GRAFANA_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "time": '$(date +%s%3N)',
            "tags": ["deploy", "atlas-dev", "'$SHORT_SHA'"],
            "text": "Deployed atlas-dev commit '$SHORT_SHA'"
          }'
    failure: ignore
    when:
      branch: dev
      path:
        - 'apps/anchor/**'
        - 'apps/shared-ui/**'
        - 'backend/**'

  # ── Notifications (Best Practice) ───────────────────────────────────────────
  notify_discord:
    image: appleboy/drone-discord
    failure: ignore

    settings:
      webhook_id: ${DISCORD_WEBHOOK_ID:-ignored}
      webhook_token: ${DISCORD_WEBHOOK_TOKEN:-ignored}
      message: >
        **Atlas Platform Deployment**
        Status: **${CI_PIPELINE_STATUS}** — Pipeline #{{build.number}}
        Failed step(s): {{build.failed_steps}}
        Branch: `{{build.branch}}` | Commit: `{{build.commit}}`
        [View Logs]({{build.link}})
    when:
      - status: [success, failure]
        event: [push]

  notify_email:
    image: drillster/drone-email
    failure: ignore

    settings:
      host:
        from_secret: SMTP_SERVER
      port:
        from_secret: SMTP_PORT
      username:
        from_secret: SMTP_USERNAME
      password:
        from_secret: SMTP_TOKEN
      from:
        from_secret: SMTP_FROM
      recipients:
        from_secret: NOTIFICATION_EMAIL
      recipients_only: true
      subject: >
        [Atlas CI] Status: ${CI_PIPELINE_STATUS} — Pipeline #${CI_PIPELINE_NUMBER}
      body: |
        <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e1e4e8; border-radius: 6px;">
          <h2 style="color: #24292e; margin-top: 0; border-bottom: 1px solid #eaecef; padding-bottom: 10px;">Atlas Platform Deployment Report</h2>
          
          <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
            <tr><td style="padding: 8px 0; font-weight: bold; width: 100px;">Status:</td><td><span style="font-weight: bold; text-transform: uppercase;">${CI_PIPELINE_STATUS}</span></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Project:</td><td>${CI_REPO_OWNER}/${CI_REPO_NAME}</td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Branch:</td><td><span style="background: #f1f8ff; padding: 3px 6px; border-radius: 3px; font-family: monospace;">${CI_COMMIT_BRANCH}</span></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Commit:</td><td><a href="${CI_REPO_URL}/commit/${CI_COMMIT_SHA}" style="color: #0366d6; text-decoration: none; font-family: monospace;">${CI_COMMIT_SHA}</a></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Message:</td><td><em>${CI_COMMIT_MESSAGE}</em></td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Author:</td><td>${CI_COMMIT_AUTHOR}</td></tr>
            <tr><td style="padding: 8px 0; font-weight: bold;">Logs:</td><td><a href="${CI_PIPELINE_URL}" style="color: #0366d6; text-decoration: none;">View Pipeline #${CI_PIPELINE_NUMBER}</a></td></tr>
          </table>

          <div style="margin-top: 25px; padding: 15px; border-radius: 3px; background-color: #f6f8fa; color: #24292e;">
            <strong>Deployment status: ${CI_PIPELINE_STATUS}.</strong> Please review the logs if this failed.
          </div>
        </div>
    when:
      - status: [success, failure]
        event: [push]

  cleanup_workspace:
    image: alpine
    commands:
      - rm -rf target/ || true
    when:
      - status: [success, failure]
        event: [push]
